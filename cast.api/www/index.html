<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Editor</title>
    
    <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 0;
            background-color: #2d2d2d;
        }

        .pane {
            background-color: #252526;
            display: flex;
            flex-direction: column;
            border-right: none;
            min-width: 100px;
            flex: 1;
        }

        .pane:last-child {
            border-right: none;
        }

        .pane-divider {
            width: 5px;
            background-color: #3e3e42;
            cursor: col-resize;
            transition: background-color 0.2s ease;
            flex-shrink: 0;
        }

        .pane-divider:hover {
            background-color: #007acc;
        }

        .pane-divider.dragging {
            background-color: #007acc;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .overlay.open {
            display: flex;
            opacity: 1;
        }
        .overlay-content {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            width: 90vw;
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transform: scale(0.95) translateY(8px);
            transition: transform 0.25s ease;
        }
        .overlay.open .overlay-content {
            transform: scale(1) translateY(0);
        }
        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #3e3e42;
            font-size: 14px;
            font-weight: 600;
        }
        .overlay-header button {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .overlay-header button:hover {
            color: #fff;
        }
        #overlay-body {
            flex: 1;
            overflow: hidden;
            padding: 16px;
            position: relative;
        }
        .graph-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }
        .graph-controls button {
            background: #3e3e42;
            border: 1px solid #555;
            color: #d4d4d4;
            cursor: pointer;
            font-size: 16px;
            width: 28px;
            height: 28px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
        }
        .graph-controls button:hover {
            background: #555;
        }
        .zoom-level {
            font-size: 11px;
            color: #888;
            min-width: 40px;
            text-align: center;
            font-weight: normal;
            font-variant-numeric: tabular-nums;
        }
        .graph-zoom-container {
            transform-origin: 0 0;
        }
        .graph-zoom-container svg {
            max-width: none;
            width: auto;
            height: auto;
            display: block;
        }
        .graph-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 11px;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #2d2d30;
            border: 1px solid #3e3e42;
            border-radius: 4px;
        }
        .graph-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .graph-legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #overlay-body .errors {
            margin-bottom: 12px;
            font-size: 12px;
        }

        .file-explorer {
            width: 250px;
            flex-shrink: 0;
        }

        .editor-pane {
            flex: 1;
        }

        .output-pane {
            flex: 1;
        }

        .editor-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        .pane-header {
            background-color: #2d2d30;
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 1px solid #3e3e42;
            color: #cccccc;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            box-sizing: border-box;
        }

        .pane-footer {
            padding: 8px;
            border-top: 1px solid #3e3e42;
            background-color: #2d2d30;
            display: flex;
            justify-content: flex-start;
        }

        #graph-btn {
            padding: 4px 12px !important;
            background: #1e88e5 !important;
            color: white !important;
            border: none !important;
            cursor: pointer !important;
            border-radius: 3px !important;
            font-size: 11px !important;
            font-weight: 500 !important;
            flex-shrink: 0;
            margin-left: auto;
        }
        
        #test-btn {
            padding: 4px 12px !important;
            background: #1e88e5 !important;
            color: white !important;
            border: none !important;
            cursor: pointer !important;
            border-radius: 3px !important;
            font-size: 11px !important;
            font-weight: 500 !important;
            flex-shrink: 0;
            margin-left: auto;
        }

        #test-btn:hover {
            background: #1565c0 !important;
        }

        #test-btn:disabled {
            background: #999 !important;
            cursor: not-allowed !important;
        }

        .editor-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        .code-editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .code-editor-container .code-highlight {
            display: none;
        }

        .code-editor-container .code-highlight code {
            background: transparent !important;
            padding: 0;
        }

        .code-editor-container .code-editor {
            position: absolute;
            inset: 0;
            background: transparent;
            color: #d4d4d4;
            caret-color: #d4d4d4;
            border: none;
            resize: none;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            outline: none;
            padding: 8px 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            scrollbar-width: thin;
            scrollbar-color: #464647 transparent;
        }

        body.light-mode .code-editor-container .code-editor {
            color: #333;
            -webkit-text-fill-color: #333;
            caret-color: #333;
        }

        .line-numbers {
            background-color: #1e1e1e;
            color: #6a9955;
            padding: 8px 12px;
            text-align: right;
            user-select: none;
            border-right: 1px solid #3e3e42;
            overflow: hidden;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }

        .line-number {
            display: block;
            height: 1.5em;
            position: relative;
        }

        .line-number.error {
            background-color: #5c2525;
            color: #ff6b6b;
            font-weight: bold;
            cursor: help;
            position: relative;
        }

        .line-number.error:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 50px;
            top: -5px;
            padding: 8px 12px;
            background-color: #d32f2f;
            color: white;
            font-size: 11px;
            border-radius: 3px;
            font-weight: normal;
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            white-space: pre-wrap;
            max-width: 500px;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .line-number.error:hover {
            z-index: 999;
        }

        .code-editor {
            flex: 1;
            overflow: auto;
            padding: 8px 12px;
            background-color: #1e1e1e;
            font-size: 13px;
            line-height: 1.5;
            color: #d4d4d4;
            border: none;
            resize: none;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            outline: none;
            scrollbar-width: thin;
            scrollbar-color: #464647 #1e1e1e;
        }

        .code-editor::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .code-editor::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .code-editor::-webkit-scrollbar-thumb {
            background: #464647;
            border-radius: 5px;
        }

        .code-editor::-webkit-scrollbar-thumb:hover {
            background: #6a6a6a;
        }

        #output-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background-color: #1e1e1e;
            display: flex;
            flex-direction: column;
        }

        .output-wrapper {
            display: flex;
            gap: 0;
            height: 100%;
            width: 100%;
        }

        .output-line-numbers {
            background-color: #1e1e1e;
            color: #6a9955;
            text-align: right;
            user-select: none;
            border-right: 1px solid #3e3e42;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            min-width: 45px;
            padding: 8px 12px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .output-line-number {
            display: block;
            height: 1.5em;
        }

        .output-code {
            flex: 1;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            overflow: auto;
            white-space: pre;
            color: #d4d4d4;
            padding: 8px 12px;
            background-color: #1e1e1e;
            margin: 0;
        }

        .output-code code {
            background: none;
            padding: 0;
            color: inherit;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
        }

        .hljs {
            background: #1e1e1e !important;
            color: #d4d4d4 !important;
        }

        .errors {
            margin-top: 12px;
            border: 1px solid #e57373;
            border-radius: 4px;
            background-color: #3c2525;
            overflow: scroll;
        }

        .errors-header {
            background-color: #d32f2f;
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 12px;
        }

        .errors ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .errors li {
            padding: 8px 12px;
            border-bottom: 1px solid #5c2525;
            color: #f1b3b3;
            font-size: 12px;
        }

        .errors li:last-child {
            border-bottom: none;
        }

        .success-message {
            padding: 8px 12px;
            background-color: #1b5e20;
            color: #81c784;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .loading-indicator {
            display: inline-block;
            padding: 4px 8px;
            background-color: #1e3a8a;
            color: #60a5fa;
            border-radius: 3px;
            font-size: 11px;
            margin-left: 8px;
            font-weight: 500;
        }

        /* GLSL Syntax Highlighting anpassen */
        .hljs-keyword { color: #569cd6; }
        .hljs-literal { color: #569cd6; }
        .hljs-built_in { color: #c8e6c9; }
        .hljs-type { color: #4fc3f7; }
        .hljs-number { color: #b5cea8; }
        .hljs-string { color: #ce9178; }
        .hljs-comment { color: #6a9955; }
        .hljs-attr { color: #9cdcfe; }
        .hljs-function { color: #dcdcaa; }

        /* File Explorer Styles */
        #file-list {
            font-size: 12px;
        }

        .file-item {
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
            margin: 2px 0;
            display: flex;
            align-items: center;
            color: #cccccc;
        }

        .file-item:hover {
            background-color: #37373d;
        }

        .file-item.active {
            background-color: #094771;
            color: #ffffff;
        }

        .file-item .file-icon {
            margin-right: 6px;
            font-size: 11px;
        }

        .file-item .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-item .delete-btn {
            opacity: 0;
            margin-left: 4px;
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 10px;
            padding: 2px;
            border-radius: 2px;
            width: 16px;
            height: 16px;
            text-align: center;
            line-height: 12px;
        }

        .file-item:hover .delete-btn {
            opacity: 1;
        }

        .file-item .delete-btn:hover {
            background-color: #ff6b6b;
            color: white;
        }

        .file-item .move-btn {
            opacity: 0.5;
            margin-left: 2px;
            margin-right: 2px;
            background: none;
            border: 1px solid #555;
            color: #aaa;
            cursor: pointer;
            font-size: 9px;
            padding: 0 3px;
            border-radius: 2px;
            line-height: 1.2;
        }
        .file-item:hover .move-btn {
            opacity: 1;
        }
        .file-item .move-btn:hover {
            background-color: #555;
            color: #fff;
        }

        .file-item .add-fragment-btn {
            opacity: 0;
            margin-left: 4px;
            background: none;
            border: none;
            color: #4caf50;
            cursor: pointer;
            font-size: 10px;
            padding: 2px;
            border-radius: 2px;
            font-weight: bold;
            width: 16px;
            height: 16px;
            text-align: center;
            line-height: 12px;
        }

        .file-item:hover .add-fragment-btn {
            opacity: 1;
        }

        .file-item .add-fragment-btn:hover {
            background-color: #4caf50;
            color: white;
        }

        /* Modal Styles */
        .modal-container {
            padding: 8px;
            background: #2d2d30;
            border: 1px solid #3e3e42;
            margin: 4px 0;
        }
        .modal-input {
            width: 100%;
            padding: 4px;
            margin-bottom: 4px;
            background: #37373d;
            color: #cccccc;
            border: 1px solid #569cd6;
            border-radius: 3px;
            font-size: 12px;
        }
        .modal-btn-primary {
            padding: 4px 8px; background: #1e88e5; color: white; border: none; border-radius: 3px; cursor: pointer;
        }
        .modal-btn-secondary {
            padding: 4px 8px; background: #666; color: white; border: none; border-radius: 3px; cursor: pointer;
        }

        /* Theme Transitions */
        body, .container, .pane, .pane-header, .pane-footer, .line-numbers, .code-editor, 
        #output-container, .output-line-numbers, .output-code, .file-item, .modal-container, 
        .modal-input, .hljs, [class^="hljs-"] {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        /* Light Mode Styles */
        body.light-mode { background-color: #f3f3f3; color: #333333; }
        body.light-mode .container { background-color: #e0e0e0; }
        body.light-mode .pane { background-color: #ffffff; border-right: 1px solid #cccccc; }
        body.light-mode .pane-header { background-color: #f3f3f3; border-bottom: 1px solid #cccccc; color: #333333; }
        body.light-mode .pane-footer { border-top: 1px solid #cccccc; background-color: #f3f3f3; }
        body.light-mode .line-numbers { background-color: #f9f9f9; color: #2b91af; border-right: 1px solid #cccccc; }
        body.light-mode .code-editor { background-color: #ffffff; color: #333333; scrollbar-color: #c1c1c1 #ffffff; }
        body.light-mode .code-editor::-webkit-scrollbar-track { background: #ffffff; }
        body.light-mode .code-editor::-webkit-scrollbar-thumb { background: #c1c1c1; }
        body.light-mode .code-editor::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        body.light-mode #output-container { background-color: #ffffff; }
        body.light-mode .output-line-numbers { background-color: #f9f9f9; color: #2b91af; border-right: 1px solid #cccccc; }
        body.light-mode .output-code { color: #333333; background-color: #ffffff; }
        body.light-mode .hljs { background: #ffffff !important; color: #333333 !important; }
        body.light-mode .code-highlight,
        body.light-mode .code-highlight code,
        body.light-mode .code-highlight code * { color: #333333 !important; }
        body.light-mode .file-item { color: #333333; }
        body.light-mode .file-item:hover { background-color: #e8e8e8; }
        body.light-mode .file-item.active { background-color: #007acc; color: #ffffff; }
        body.light-mode .errors { border: 1px solid #ffbaba; background-color: #ffeded; }
        body.light-mode .errors-header { background-color: #d8000c; color: white; }
        body.light-mode .errors li { border-bottom: 1px solid #ffbaba; color: #d8000c; }
        body.light-mode .hljs-keyword { color: #0000ff; }
        body.light-mode .hljs-literal { color: #0000ff; }
        body.light-mode .hljs-built_in { color: #795e26; }
        body.light-mode .hljs-type { color: #267f99; }
        body.light-mode .hljs-number { color: #098658; }
        body.light-mode .hljs-string { color: #a31515; }
        body.light-mode .hljs-comment { color: #008000; }
        body.light-mode .hljs-attr { color: #001080; }
        body.light-mode .hljs-function { color: #795e26; }
        
        body.light-mode .modal-container { background: #f3f3f3; border-color: #cccccc; }
        body.light-mode .modal-input { background: #ffffff; color: #333333; border-color: #007acc; }
        body.light-mode .graph-legend { background: #f3f3f3; border-color: #cccccc; color: #333333; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Linkes Fenster: File Explorer -->
        <div class="pane file-explorer" style="flex: 0 0 250px;">
            <div class="pane-header">
                <span>Shader Files</span>
                <div>
                    <button id="new-pass-btn" type="button" style="padding: 4px 8px; background: #1e88e5; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; margin-right: 4px;">New Pass</button>
                    <button id="new-file-btn" type="button" style="padding: 4px 8px; background: #1e88e5; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px;">+</button>
                </div>
            </div>
            <div id="file-list" style="flex: 1; overflow-y: auto; padding: 8px;">
                <!-- Dateien werden hier dynamisch eingefügt -->
            </div>
            <div class="pane-footer">
                <button id="export-btn" type="button" style="padding: 4px 8px; background: #4caf50; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; margin-right: 4px;">Export</button>
                <button id="import-btn" type="button" style="padding: 4px 8px; background: #ff9800; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; margin-right: 4px;">Import</button>
                <select id="example-select" style="padding: 4px 8px; background: #7c4dff; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; margin-right: 4px;">
                    <option value="">Examples</option>
                    <option value="deferred">Simple Deferred</option>
                    <option value="ssao">Deferred + SSAO</option>
                </select>
                <button id="reset-btn" type="button" style="padding: 4px 8px; background: #f44336; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px;">Reset Storage</button>
            </div>
        </div>
        <div class="pane-divider" data-divider="0"></div>
        <!-- Mittleres Fenster: Code Editor -->
        <div class="pane editor-pane">
            <div class="pane-header">
                <span id="current-file-name">Cast Code</span>
            </div>
            <div class="editor-wrapper">
                <div class="line-numbers" id="editor-line-numbers"></div>
                <div class="code-editor-container">
                    <pre class="code-highlight"><code id="editor-highlight" class="language-glsl hljs"></code></pre>
                    <textarea 
                        id="code-editor" 
                        class="code-editor" 
                        spellcheck="false"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"></textarea>
                </div>
            </div>
        </div>
        <div class="pane-divider" data-divider="1"></div>
        <div class="pane output-pane">
            <div class="pane-header">
                <span>Compiled Result <span class="loading-indicator" id="loading-status"></span></span>
                <div>
                    <button id="theme-toggle-btn" type="button" style="padding: 4px 8px; background: #555; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; margin-right: 4px;" title="Toggle Light/Dark Mode">☀️</button>
                    <button id="graph-btn">Visualize</button>
                    <button id="test-btn">Test</button>
                </div>
            </div>
            <div id="output-container">
                <p style="color: #888;">The compilation result will be displayed here. Start by entering code in the left window.</p>
            </div>
        </div>

    </div>

    <div id="graph-overlay" class="overlay">
        <div class="overlay-content">
            <div class="overlay-header">
                <span>Pipeline Graph</span>
                <div class="graph-controls">
                    <span id="zoom-level" class="zoom-level">100%</span>
                    <button id="zoom-out-btn" title="Rauszoomen">−</button>
                    <button id="zoom-reset-btn" title="Zurücksetzen">⟲</button>
                    <button id="zoom-in-btn" title="Reinzoomen">+</button>
                    <button id="overlay-close" style="margin-left:8px;background:none;border:none;color:#888;font-size:24px;cursor:pointer;padding:0 4px;line-height:1;">&times;</button>
                </div>
            </div>
            <div id="overlay-body"></div>
        </div>
    </div>

    <script>
        // Vim-style resizable panes
        const container = document.querySelector('.container');
        const dividers = document.querySelectorAll('.pane-divider');
        const panes = document.querySelectorAll('.pane');

        dividers.forEach((divider, index) => {
            let isResizing = false;
            let startX = 0;
            let startWidths = [];

            divider.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidths = Array.from(panes).map(p => p.offsetWidth);
                divider.classList.add('dragging');
                document.body.style.userSelect = 'none';
                document.body.style.cursor = 'col-resize';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;

                const diff = e.clientX - startX;
                const leftPane = panes[index];
                const rightPane = panes[index + 1];

                const newLeftWidth = Math.max(100, startWidths[index] + diff);
                const newRightWidth = Math.max(100, startWidths[index + 1] - diff);

                leftPane.style.flex = `0 0 ${newLeftWidth}px`;
                rightPane.style.flex = `0 0 ${newRightWidth}px`;
            });

            document.addEventListener('mouseup', () => {
                if (!isResizing) return;
                isResizing = false;
                divider.classList.remove('dragging');
                document.body.style.userSelect = '';
                document.body.style.cursor = '';
            });
        });

        let shaderFiles = {};
        let stageOrder = {};
        try {
            const stored = localStorage.getItem('shaderFiles');
            if (stored) {
                const parsed = JSON.parse(stored);
                shaderFiles = parsed.files || parsed;
                stageOrder = parsed.order || {};
            } else {
                // legacy flat format
                const legacy = localStorage.getItem('shaderFiles_legacy');
                if (legacy) {
                    shaderFiles = JSON.parse(legacy);
                }
            }
        } catch (e) {
            console.warn('Error loading shader files from localStorage:', e);
            shaderFiles = {};
            stageOrder = {};
        }
        let currentPath = null;

        let fileList, newFileBtn, newPassBtn, currentFileNameEl;

        function getFileByPath(path) {
            if (!path || path.length === 0) return null;
            const [stage, ...rest] = path;
            if (!shaderFiles[stage]) return null;
            let current = shaderFiles[stage];
            for (let i of rest) {
                if (current && Array.isArray(current) && current[i]) {
                    current = current[i];
                } else if (current && current.children && Array.isArray(current.children) && current.children[i]) {
                    current = current.children[i];
                } else {
                    return null;
                }
            }
            return current;
        }

        function updateCurrentFileName() {
            const file = getFileByPath(currentPath);
            if (file) {
                currentFileNameEl.textContent = file.name;
            } else {
                currentFileNameEl.textContent = 'Cast Code';
            }
        }

        function renderFileList(container = fileList, level = 0) {
            if (level === 0) {
                container.innerHTML = '';
            }
            const stages = Object.keys(shaderFiles).sort((a, b) => {
                const oa = stageOrder[a] || 0;
                const ob = stageOrder[b] || 0;
                return oa - ob || a.localeCompare(b);
            });
            stages.forEach((stage, idx) => {
                if (!shaderFiles[stage] || !Array.isArray(shaderFiles[stage])) {
                    shaderFiles[stage] = [];
                }

                const stageItem = document.createElement('div');
                stageItem.className = 'file-item';
                stageItem.style.paddingLeft = `${level * 20 + 8}px`;
                const upBtn = idx > 0 ? `<button class="move-btn" onclick="event.stopPropagation();moveStage('${stage}', -1)" title="nach oben">▲</button>` : '';
                const dnBtn = idx < stages.length - 1 ? `<button class="move-btn" onclick="event.stopPropagation();moveStage('${stage}', 1)" title="nach unten">▼</button>` : '';
                stageItem.innerHTML = `<span class="file-icon">📁</span>${upBtn}${dnBtn}<span class="file-name">${stage.replace('_', ' ').toUpperCase()}</span>`;
                container.appendChild(stageItem);

                renderStage(container, shaderFiles[stage], [stage], level + 1);
            });
            if (level === 0) {
                updateCurrentFileName();
            }
        }

        function renderStage(container, files, path, level) {
            files.forEach((file, index) => {
                const itemPath = path.concat(index);
                const isActive = JSON.stringify(itemPath) === JSON.stringify(currentPath);
                const fileItem = document.createElement('div');
                fileItem.className = `file-item ${isActive ? 'active' : ''}`;
                fileItem.style.paddingLeft = `${level * 20 + 8}px`;
                let buttons = `<button class="delete-btn" onclick="deleteFile('${itemPath.join(',')}')">×</button>`;
                if (file.name.endsWith('.vsh')) {
                    buttons += `<button class="add-fragment-btn" title="Fragment Shader hinzufügen" onclick="addFragmentShader('${itemPath.join(',')}')">F</button>`;
                }
                let icon = '📄';
                if (file.name.endsWith('.vsh')) {
                    icon = '🔺'; // Vertex Shader Icon
                } else if (file.name.endsWith('.fsh')) {
                    icon = '🎨'; // Fragment Shader Icon
                } else if (file.children && file.children.length > 0) {
                    icon = '📁';
                }
                fileItem.innerHTML = `
                    <span class="file-icon">${icon}</span>
                    <span class="file-name">${file.name}</span>
                    ${buttons}
                `;
                fileItem.onclick = () => selectFile(itemPath);
                container.appendChild(fileItem);

                if (file.children && file.children.length > 0) {
                    renderStage(container, file.children, itemPath, level + 1);
                }
            });
        }

        function addFragmentShader(vertexPathStr) {
            const parts = vertexPathStr.split(',');
            const stage = parts[0];
            const indices = parts.slice(1).map(Number);
            const vertexPath = [stage, ...indices];
            const vertexFile = getFileByPath(vertexPath);
            if (!vertexFile || !vertexFile.name.endsWith('.vsh')) return;
            
            const baseName = vertexFile.name.replace('.vsh', '');
            const fragmentName = baseName + '.fsh';
            
            if (vertexFile.children && vertexFile.children.some(child => child.name === fragmentName)) {
                alert('Fragment Shader already exists for this vertex shader.');
                return;
            }
            
            const newFragment = {
                name: fragmentName,
                content: '#version 330\n\nvoid main() {\n    // Fragment shader code for ' + baseName + '\n}',
                children: undefined
            };
            
            if (!vertexFile.children) vertexFile.children = [];
            vertexFile.children.push(newFragment);
            
            saveFiles();
            renderFileList();
        }

        function importProject() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const importedData = JSON.parse(event.target.result);
                            if (importedData.files) {
                                shaderFiles = importedData.files;
                                stageOrder = importedData.order || {};
                            } else {
                                shaderFiles = importedData;
                                stageOrder = {};
                                let n = 1;
                                Object.keys(shaderFiles).sort().forEach(s => { stageOrder[s] = n++; });
                            }
                            saveFiles();
                            renderFileList();
                            // Setze currentPath auf erste verfügbare Datei
                            const stages = Object.keys(shaderFiles).sort();
                            if (stages.length > 0) {
                                const firstStage = stages[0];
                                if (shaderFiles[firstStage].length > 0) {
                                    currentPath = [firstStage, 0];
                                }
                            }
                            loadCurrentFile();
                        } catch (error) {
                            alert('Error importing: ' + error.message);
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        function loadExample(name) {
            if (name === 'deferred') {
                shaderFiles = {
                    gbuffer: [
                        {
                            name: 'gbuffer.vsh',
                            content: `#version 330

layout(location = 0) in vec3<Object> a_Position;
layout(location = 1) in vec3<Object> a_Normal;
layout(location = 2) in vec2 a_TexCoord;

out vec3<World> v_WorldPos;
out vec3<World> v_Normal;
out vec2 v_TexCoord;

uniform mat4<Object, World> u_Model;
uniform mat4<World, Clip> u_ViewProjection;

void main() {
    vec4<World> worldPos = u_Model * vec4<Object>(a_Position, 1.0);
    v_WorldPos = worldPos.xyz;
    v_Normal = mat3(u_Model) * a_Normal;
    v_TexCoord = a_TexCoord;
    gl_Position = u_ViewProjection * worldPos;
}`,
                            children: [
                                {
                                    name: 'gbuffer.fsh',
                                    content: `#version 330

in vec3<World> v_WorldPos;
in vec3<World> v_Normal;
in vec2 v_TexCoord;

layout(location = 0) out vec4<Color> gbuf_albedo;
layout(location = 1) out vec4<World> gbuf_normal;
layout(location = 2) out vec4 gbuf_metallicRoughness;

uniform sampler2D u_AlbedoMap;
uniform sampler2D u_NormalMap;
uniform sampler2D u_MetallicRoughnessMap;

void main() {
    vec4 albedo = texture(u_AlbedoMap, v_TexCoord);
    gbuf_albedo = albedo;
    gbuf_normal = vec4(normalize(v_Normal), 0.0);
    gbuf_metallicRoughness = texture(u_MetallicRoughnessMap, v_TexCoord);
}`
                                }
                            ]
                        }
                    ],
                    lighting: [
                        {
                            name: 'lighting.vsh',
                            content: `#version 330

layout(location = 0) in vec2 a_Position;
layout(location = 1) in vec2 a_TexCoord;

out vec2 v_TexCoord;

void main() {
    v_TexCoord = a_TexCoord;
    gl_Position = vec4(a_Position, 0.0, 1.0);
}`,
                            children: [
                                {
                                    name: 'lighting.fsh',
                                    content: `#version 330

in vec2 v_TexCoord;

layout(location = 0) out vec4<Color> out_Color;

uniform sampler2D gbuf_albedo;
uniform sampler2D gbuf_normal;
uniform sampler2D gbuf_metallicRoughness;

uniform vec3<World> u_LightDirection;
uniform vec3<Color> u_LightColor;

void main() {
    vec4<Color> albedo = texture(gbuf_albedo, v_TexCoord);
    vec4<World> packedNormal = texture(gbuf_normal, v_TexCoord);
    vec3<World> normal = normalize(packedNormal.xyz);
    vec3<World> lightDir = normalize(u_LightDirection);
    float NdotL = max(dot(normal, lightDir), 0.0);
    vec3<Color> diffuse = albedo.xyz * u_LightColor * NdotL;
    out_Color = vec4(diffuse, 1.0);
}`
                                }
                            ]
                        }
                    ]
                };
                stageOrder = { gbuffer: 1, lighting: 2 };
            } else if (name === 'ssao') {
                shaderFiles = {
                    gbuffer: [
                        {
                            name: 'gbuffer.vsh',
                            content: `#version 330

layout(location = 0) in vec3<Object> a_Position;
layout(location = 1) in vec3<Object> a_Normal;
layout(location = 2) in vec2 a_TexCoord;

out vec3<World> v_WorldPos;
out vec3<World> v_Normal;
out vec2 v_TexCoord;

uniform mat4<Object, World> u_Model;
uniform mat4<World, Clip> u_ViewProjection;

void main() {
    vec4<World> worldPos = u_Model * vec4<Object>(a_Position, 1.0);
    v_WorldPos = worldPos.xyz;
    v_Normal = mat3(u_Model) * a_Normal;
    v_TexCoord = a_TexCoord;
    gl_Position = u_ViewProjection * worldPos;
}`,
                            children: [
                                {
                                    name: 'gbuffer.fsh',
                                    content: `#version 330

in vec3<World> v_WorldPos;
in vec3<World> v_Normal;
in vec2 v_TexCoord;

layout(location = 0) out vec4<Color> gbuf_albedo;
layout(location = 1) out vec4<World> gbuf_normal;
layout(location = 2) out vec4 gbuf_metallicRoughness;
layout(location = 3) out float gbuf_depth;

uniform sampler2D u_AlbedoMap;
uniform sampler2D u_NormalMap;
uniform sampler2D u_MetallicRoughnessMap;

void main() {
    vec4 albedo = texture(u_AlbedoMap, v_TexCoord);
    gbuf_albedo = albedo;
    gbuf_normal = vec4(normalize(v_Normal), 0.0);
    gbuf_metallicRoughness = texture(u_MetallicRoughnessMap, v_TexCoord);
    gbuf_depth = gl_FragCoord.z;
}`
                                }
                            ]
                        }
                    ],
                    ssao: [
                        {
                            name: 'ssao.vsh',
                            content: `#version 330

layout(location = 0) in vec2 a_Position;
layout(location = 1) in vec2 a_TexCoord;

out vec2 v_TexCoord;

void main() {
    v_TexCoord = a_TexCoord;
    gl_Position = vec4(a_Position, 0.0, 1.0);
}`,
                            children: [
                                {
                                    name: 'ssao.fsh',
                                    content: `#version 330

in vec2 v_TexCoord;

layout(location = 0) out float ssao_result;

uniform sampler2D gbuf_normal;
uniform sampler2D gbuf_depth;
uniform vec2 u_ScreenSize;

void main() {
    vec4<World> normalTexel = texture(gbuf_normal, v_TexCoord);
    vec3<World> normal = normalize(normalTexel.xyz);
    float depth = texture(gbuf_depth, v_TexCoord).r;

    vec2 texelStep = vec2(1.0, 1.0) / u_ScreenSize * 0.5;
    float bias = 0.01;

    float occlusion = 0.0;
    vec2 offset;

    offset = v_TexCoord + vec2(texelStep.x, 0.0);
    occlusion += step(texture(gbuf_depth, offset).r - depth - bias, 0.0);

    offset = v_TexCoord + vec2(-texelStep.x, 0.0);
    occlusion += step(texture(gbuf_depth, offset).r - depth - bias, 0.0);

    offset = v_TexCoord + vec2(0.0, texelStep.y);
    occlusion += step(texture(gbuf_depth, offset).r - depth - bias, 0.0);

    offset = v_TexCoord + vec2(0.0, -texelStep.y);
    occlusion += step(texture(gbuf_depth, offset).r - depth - bias, 0.0);

    ssao_result = 1.0 - occlusion / 4.0;
}`
                                }
                            ]
                        }
                    ],
                    lighting: [
                        {
                            name: 'lighting.vsh',
                            content: `#version 330

layout(location = 0) in vec2 a_Position;
layout(location = 1) in vec2 a_TexCoord;

out vec2 v_TexCoord;

void main() {
    v_TexCoord = a_TexCoord;
    gl_Position = vec4(a_Position, 0.0, 1.0);
}`,
                            children: [
                                {
                                    name: 'lighting.fsh',
                                    content: `#version 330

in vec2 v_TexCoord;

layout(location = 0) out vec4 lighting_result;

uniform sampler2D gbuf_albedo;
uniform sampler2D gbuf_normal;
uniform sampler2D gbuf_metallicRoughness;
uniform sampler2D ssao_result;

uniform vec3<World> u_LightDirection;
uniform vec3<Color> u_LightColor;

void main() {
    vec4<Color> albedo = texture(gbuf_albedo, v_TexCoord);
    vec4<World> packedNormal = texture(gbuf_normal, v_TexCoord);
    vec3<World> normal = normalize(packedNormal.xyz);
    float ssao = texture(ssao_result, v_TexCoord).r;
    vec3<World> lightDir = normalize(u_LightDirection);
    float NdotL = max(dot(normal, lightDir), 0.0);
    vec3<Color> diffuse = albedo.xyz * u_LightColor * NdotL * ssao;
    vec3<Color> ambient = albedo.xyz * 0.05;
    lighting_result = vec4(diffuse + ambient, 1.0);
}`
                                }
                            ]
                        }
                    ],
                    postprocess: [
                        {
                            name: 'post.vsh',
                            content: `#version 330

layout(location = 0) in vec2 a_Position;
layout(location = 1) in vec2 a_TexCoord;

out vec2 v_TexCoord;

void main() {
    v_TexCoord = a_TexCoord;
    gl_Position = vec4(a_Position, 0.0, 1.0);
}`,
                            children: [
                                {
                                    name: 'post.fsh',
                                    content: `#version 330

in vec2 v_TexCoord;

layout(location = 0) out vec4<Color> out_FinalColor;

uniform sampler2D lighting_result;
uniform float u_Exposure;

void main() {
    vec4<Color> color = texture(lighting_result, v_TexCoord);
    out_FinalColor = vec4(color.xyz * u_Exposure, 1.0);
}`
                                }
                            ]
                        }
                    ]
                };
                stageOrder = { gbuffer: 1, ssao: 2, lighting: 3, postprocess: 4 };
            }

            document.getElementById('example-select').value = '';
            saveFiles();
            renderFileList();
            const stages = Object.keys(shaderFiles).sort();
            if (stages.length > 0 && shaderFiles[stages[0]].length > 0) {
                currentPath = [stages[0], 0];
            }
            loadCurrentFile();
        }

        // Projekt exportieren
        function exportProject() {
            const exportData = { files: {}, order: {} };
            Object.keys(shaderFiles).sort((a, b) => {
                const oa = stageOrder[a] || 0;
                const ob = stageOrder[b] || 0;
                return oa - ob;
            }).forEach(stage => {
                if (stage !== 'shadow') {
                    exportData.files[stage] = shaderFiles[stage];
                    exportData.order[stage] = stageOrder[stage] || 0;
                }
            });
            const dataStr = JSON.stringify(exportData, null, 2);
            if (dataStr === '{}' || dataStr.length < 10) {
                alert('No data to export found. Add files first.');
                return;
            }
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'shader-project.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function createNewFile(e) {
            if (e) e.preventDefault();
            const container = document.createElement('div');
            container.className = 'modal-container';
            
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.placeholder = 'Dateiname eingeben...';
            nameInput.className = 'modal-input';
            
            const typeSelect = document.createElement('select');
            typeSelect.className = 'modal-input';
            typeSelect.innerHTML = '<option value="vertex">Vertex Shader</option><option value="fragment">Fragment Shader</option>';
            
            const stageSelect = document.createElement('select');
            stageSelect.className = 'modal-input';
            function populateStages() {
                stageSelect.innerHTML = '';
                Object.keys(shaderFiles).sort().forEach(stage => {
                    const option = document.createElement('option');
                    option.value = stage;
                    option.textContent = stage.replace('_', ' ').toUpperCase();
                    stageSelect.appendChild(option);
                });
            }
            populateStages();
            
            const parentSelect = document.createElement('select');
            parentSelect.className = 'modal-input';
            parentSelect.innerHTML = '<option value="">Kein Parent (Root)</option>';
            
            function populateParents() {
                const selectedStage = stageSelect.value;
                parentSelect.innerHTML = '<option value="">Kein Parent (Root)</option>';
                if (shaderFiles[selectedStage]) {
                    function addOptions(files, path = []) {
                        files.forEach((file, index) => {
                            if (file.children) {
                                const option = document.createElement('option');
                                option.value = path.concat(index).join(',');
                                option.textContent = '  '.repeat(path.length) + file.name;
                                parentSelect.appendChild(option);
                                addOptions(file.children, path.concat(index));
                            }
                        });
                    }
                    addOptions(shaderFiles[selectedStage]);
                }
            }
            stageSelect.addEventListener('change', populateParents);
            populateParents();
            
            container.appendChild(nameInput);
            container.appendChild(typeSelect);
            container.appendChild(stageSelect);
            container.appendChild(parentSelect);
            
            const buttons = document.createElement('div');
            buttons.style.cssText = 'display: flex; gap: 4px;';
            const okBtn = document.createElement('button');
            okBtn.textContent = 'Erstellen';
            okBtn.className = 'modal-btn-primary';
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Abbrechen';
            cancelBtn.className = 'modal-btn-secondary';
            buttons.appendChild(okBtn);
            buttons.appendChild(cancelBtn);
            container.appendChild(buttons);
            
            fileList.appendChild(container);
            nameInput.focus();
            
            const removeContainer = () => {
                if (fileList.contains(container)) {
                    fileList.removeChild(container);
                }
            };
            
            okBtn.onclick = () => {
                let fileName = nameInput.value.trim();
                const type = typeSelect.value;
                const stage = stageSelect.value;
                const parentPath = parentSelect.value ? parentSelect.value.split(',').map(Number) : null;
                
                if (fileName && stage) {
                    fileName = fileName.replace(/\.(vsh|fsh)$/i, '');
                    const extension = type === 'vertex' ? '.vsh' : '.fsh';
                    const finalName = fileName + extension;

                    if (!shaderFiles[stage]) shaderFiles[stage] = [];
                    if (!stageOrder[stage]) {
                        const maxOrder = Object.keys(stageOrder).reduce((max, k) => Math.max(max, stageOrder[k] || 0), 0);
                        stageOrder[stage] = maxOrder + 1;
                    }
                    
                    const newFile = {
                        name: finalName,
                        content: type === 'vertex' ? '#version 330\n\nvoid main() {\n    // Vertex shader code for ' + stage + '\n}' : '#version 330\n\nvoid main() {\n    // Fragment shader code for ' + stage + '\n}',
                        children: type === 'vertex' ? [] : undefined
                    };
                    
                    if (parentPath) {
                        const parent = getFileByPath([stage, ...parentPath]);
                        if (parent && parent.children) {
                            parent.children.push(newFile);
                        } else {
                            shaderFiles[stage].push(newFile); // Fallback
                        }
                    } else {
                        shaderFiles[stage].push(newFile);
                    }
                    
                    saveFiles();
                    renderFileList();
                    removeContainer();
                }
            };
            
            cancelBtn.onclick = removeContainer;
            
            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') okBtn.click();
                if (e.key === 'Escape') cancelBtn.click();
            });
        }

        function createNewPass() {
            const container = document.createElement('div');
            container.className = 'modal-container';
            
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.placeholder = 'Pass-Name eingeben...';
            nameInput.className = 'modal-input';
            
            const typeSelect = document.createElement('select');
            typeSelect.className = 'modal-input';
            typeSelect.innerHTML = `
                <option value="shadow">Shadow Pass</option>
                <option value="depth_only">Depth Only Pass</option>
                <option value="geometry">Geometry Pass</option>
                <option value="fullscreen">Fullscreen Pass</option>
                <option value="forward">Forward Pass</option>
                <option value="post_process">Post Process Pass</option>
                <option value="custom">Custom Pass</option>
            `;
            
            container.appendChild(nameInput);
            container.appendChild(typeSelect);
            
            const buttons = document.createElement('div');
            buttons.style.cssText = 'display: flex; gap: 4px;';
            const okBtn = document.createElement('button');
            okBtn.textContent = 'Erstellen';
            okBtn.className = 'modal-btn-primary';
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Abbrechen';
            cancelBtn.className = 'modal-btn-secondary';
            buttons.appendChild(okBtn);
            buttons.appendChild(cancelBtn);
            container.appendChild(buttons);
            
            fileList.appendChild(container);
            nameInput.focus();
            
            const removeContainer = () => {
                if (fileList.contains(container)) {
                    fileList.removeChild(container);
                }
            };
            
            okBtn.onclick = () => {
                const passName = nameInput.value.trim();
                const passType = typeSelect.value;

                if (passName && !shaderFiles[passName]) {
                    shaderFiles[passName] = [];
                    const maxOrder = Object.keys(stageOrder).reduce((max, k) => Math.max(max, stageOrder[k] || 0), 0);
                    stageOrder[passName] = maxOrder + 1;
                    saveFiles();
                    renderFileList();
                    removeContainer();
                } else if (shaderFiles[passName]) {
                    alert('Pass name already exists.');
                }
            };
            
            cancelBtn.onclick = removeContainer;
            
            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') okBtn.click();
                if (e.key === 'Escape') cancelBtn.click();
            });
        }

        // Datei auswählen
        function selectFile(path) {
            try {
                saveCurrentFile();
                currentPath = path;
                const file = getFileByPath(currentPath);
                if (!file) {
                    console.error('File not found at path:', currentPath);
                    return;
                }
                renderFileList();
                loadCurrentFile();
            } catch (error) {
                console.error('Error selecting file:', error);
            }

        // Datei löschen
        function deleteFile(pathStr) {
            const path = pathStr.split(',');
            const stage = path[0];
            const rest = path.slice(1).map(Number);
            const file = getFileByPath(path);
            if (confirm(`Delete "${file ? file.name : 'file'}"?`)) {
                // Entferne aus der Struktur
                function removeFrom(files, path) {
                    if (path.length === 1) {
                        files.splice(path[0], 1);
                    } else {
                        const parent = files[path[0]];
                        if (parent && parent.children) {
                            removeFrom(parent.children, path.slice(1));
                        }
                    }
                }
                removeFrom(shaderFiles[stage], rest);
                
                // Passe currentPath an
                if (JSON.stringify(currentPath.slice(0, path.length)) === JSON.stringify(path)) {
                    currentPath = ['shadow', 0]; // Fallback
                }
                
                saveFiles();
                renderFileList();
                loadCurrentFile();
            }
        }

        function moveStage(stage, dir) {
            const stages = Object.keys(shaderFiles).sort((a, b) => {
                const oa = stageOrder[a] || 0;
                const ob = stageOrder[b] || 0;
                return oa - ob || a.localeCompare(b);
            });
            const idx = stages.indexOf(stage);
            if (idx < 0) return;
            const target = idx + dir;
            if (target < 0 || target >= stages.length) return;
            const tmp = stageOrder[stage];
            stageOrder[stage] = stageOrder[stages[target]];
            stageOrder[stages[target]] = tmp;
            saveFiles();
            renderFileList();
        }

                    function updateTransform() {
                        zoomContainer.style.transform = `scale(${zoomScale}) translate(${panX}px, ${panY}px)`;
                        if (zoomLevelEl) zoomLevelEl.textContent = Math.round(zoomScale * 100) + '%';
                    }

                    document.getElementById('zoom-in-btn').onclick = () => {
                        zoomScale = Math.min(zoomScale * 1.3, 5);

                        zoomScale = Math.max(zoomScale / 1.3, 0.1);
                        updateTransform();
                    };
                    document.getElementById('zoom-reset-btn').onclick = () => {
                        zoomScale = 1;
                        panX = 0;
                        panY = 0;
                        updateTransform();
                    };

                    body.addEventListener('wheel', (e) => {
                        e.preventDefault();
                        const delta = e.deltaY > 0 ? 0.9 : 1.1;
                        const newScale = Math.min(Math.max(zoomScale * delta, 0.1), 5);
                        const rect = body.getBoundingClientRect();
                        const mx = e.clientX - rect.left - 16;
                        const my = e.clientY - rect.top - 16;
                        panX = panX + mx * (1 / newScale - 1 / zoomScale);
                        panY = panY + my * (1 / newScale - 1 / zoomScale);
                        zoomScale = newScale;
                        updateTransform();
                    }, { passive: false });

                    let panning = false, startX, startY, startPanX, startPanY;
                    body.addEventListener('mousedown', (e) => {
                        if (e.target.closest('button') || e.target.closest('.graph-legend')) return;
                        panning = true;

                    const endPan = () => {
                        panning = false;
                        body.style.cursor = 'grab';

                    body.addEventListener('mousemove', (e) => {
                        if (!panning) return;
                        panX = startPanX + (e.clientX - startX) / zoomScale;

                        updateTransform();
                    });
                    body.addEventListener('mouseup', endPan);
                    body.addEventListener('mouseleave', endPan);
                    body.style.cursor = 'grab';

        function getShaderFilesForGraph() {

                return oa - ob || a.localeCompare(b);
            });
            stages.forEach(stage => {
                if (Array.isArray(shaderFiles[stage]) && shaderFiles[stage].length > 0) {
                    result[stage] = shaderFiles[stage].map(f => ({
                        name: f.name,
                        content: f.content || '',
                        children: f.children && f.children.length > 0 ? f.children.map(c => ({
                            name: c.name,
                            content: c.content || ''
                        })) : null
                    }));
                }
            });
            return result;
        }

        function htmlEscape(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");

                if (start !== end) {
                    const beforeSelection = value.substring(0, start);

                    let lineStart = beforeSelection.lastIndexOf('\n') + 1;

                const selectedText = value.substring(start, end);
                
                codeEditor.value = value.substring(0, start) + "'" + selectedText + "'" + value.substring(end);
                codeEditor.selectionStart = start + 1;
                if (start === end) {
                    codeEditor.selectionEnd = start + 1;
                } else {
                    codeEditor.selectionEnd = end + 1;
                }
                codeEditor.dispatchEvent(new Event('input'));
            }
        });

        let requestId = 0;
        codeEditor.addEventListener('input', () => {
            updateLineNumbers();
            saveCurrentFile();
            
            if (debounceTimer !== null) {
                clearTimeout(debounceTimer);
            }
            
            if (abortController !== null) {
                abortController.abort();
            }
            
            const currentRequestId = ++requestId;
            
            debounceTimer = setTimeout(() => {
                abortController = new AbortController();
                loadingStatus.textContent = 'transpiling...';
                loadingStatus.style.display = 'inline-block';
                
                const code = codeEditor.value;
                
                fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ Input: code }),
                    signal: abortController.signal
                })
                .then(response => response.json())
                .then(data => {
                    if (currentRequestId !== requestId) return;
                    
                    let htmlResponse = '';
                    let errorMap = {};
                    if (data.errors && data.errors.length > 0) {
                        data.errors.forEach(err => {
                            const match = err.match(/\[Line (\d+):/);
                            if (match) {
                                const lineNum = parseInt(match[1]);
                                errorMap[lineNum] = err;
                            }
                        });
                    }
                    
                    document.querySelectorAll('.line-number').forEach((lineEl, index) => {
                        const lineNum = index + 1;
                        if (errorMap[lineNum]) {
                            lineEl.classList.add('error');
                            lineEl.setAttribute('data-tooltip', errorMap[lineNum]);
                        } else {
                            lineEl.classList.remove('error');
                            lineEl.removeAttribute('data-tooltip');
                        }
                    });
                    
                    if (data.result && data.result.trim()) {
                        let normalizedResult = data.result.replace(/\r\n/g, '\n');
                        
                        const lines = normalizedResult.split('\n');
                        
                        const lineNumbersHtml = lines.map((_, i) => `<div class="output-line-number">${i + 1}</div>`).join('');
                        const escapedResult = normalizedResult.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        htmlResponse += `<div class="output-wrapper"><div class="output-line-numbers">${lineNumbersHtml}</div><div class="output-code"><code class="language-glsl hljs">${escapedResult}</code></div></div>`;
                        
                        setTimeout(() => {
                            const outputCode = outputContainer.querySelector('.output-code');
                            const outputLineNumbers = outputContainer.querySelector('.output-line-numbers');
                            if (outputCode && outputLineNumbers) {
                                outputCode.addEventListener('scroll', () => {
                                    outputLineNumbers.scrollTop = outputCode.scrollTop;
                                });
                            }
                        }, 0);
                    }
                    
                    if (data.errors && data.errors.length > 0) {
                        const errorItems = data.errors.map(err => {
                            const match = err.match(/\[Line (\d+):(\d+)\]\s*(.*)/);
                            if (match) {
                                const [, line, column, rest] = match;
                                return `<li><strong>Line Nr: ${(parseInt(line))}:${column}</strong><br>${htmlEscape(rest)}</li>`;
                            }
                            return `<li>${err}</li>`;
                        }).join('');

                        htmlResponse += `<div class="errors"><div class="errors-header">⚠️ ${data.errors.length} Error while transpiling:</div><ul>${errorItems}</ul></div>`;
                    }
                    
                    if (!data.result && (!data.errors || data.errors.length === 0)) {
                        htmlResponse = '<p style="color: #81c784;">✅ Successfully transpiled to GLSL!</p>';
                    }
                    
                    outputContainer.innerHTML = htmlResponse;
                    const outCode = outputContainer.querySelector('.output-code code');
                    if (outCode) hljs.highlightElement(outCode);
                    
                    loadingStatus.textContent = '✅ updated';
                    setTimeout(() => {
                        loadingStatus.textContent = '';
                        loadingStatus.style.display = 'none';
                    }, 2000);
                })
                .catch(error => {
                    if (error.name === 'AbortError') return;
                    console.error('❌ Compile request failed:', error);
                    loadingStatus.textContent = '❌ Error';
                    outputContainer.innerHTML = '<p style="color: #ff6b6b;">❌ Error while compiling!<br>' + error.message + '<br><br>Make sure the backend server is running on port 5264.</p>';
                });
            }, DEBOUNCE_TIME_MS);
        });

        hljs.registerLanguage('glsl', function(hljs) {
            return {
                name: 'GLSL',
                keywords: {
                    keyword: 'attribute uniform varying break continue do for while switch case default if else in out inout const invariant centroid flat smooth void discard return true false layout precision highp mediump lowp',
                    built_in: 'radians degrees sin cos tan asin acos atan sinh cosh tanh asinh acosh atanh pow exp log exp2 log2 sqrt inversesqrt abs sign floor trunc round roundEven ceil fract mod modf min max clamp mix step smoothstep isnan isinf floatBitsToInt floatBitsToUint intBitsToFloat uintBitsToFloat fma frexp ldexp length distance dot cross normalize faceforward reflect refract matrixCompMult outerProduct transpose determinant inverse lessThan lessThanEqual greaterThan greaterThanEqual equal notEqual any all not textureSize texture textureProj textureLod textureOffset texelFetch texelFetchOffset dFdx dFdy fwidth gl_FragCoord gl_Position gl_PointSize gl_VertexID gl_InstanceID',
                    type: 'vec2 vec3 vec4 ivec2 ivec3 ivec4 bvec2 bvec3 bvec4 dvec2 dvec3 dvec4 uint uvec2 uvec3 uvec4 mat2 mat3 mat4 dmat2 dmat3 dmat4 sampler1D sampler2D sampler3D samplerCube Screen Local Clip Model View World Projection Color'
                },
                contains: [
                    hljs.C_LINE_COMMENT_MODE,
                    hljs.C_BLOCK_COMMENT_MODE,
                    hljs.C_NUMBER_MODE,
                    { className: 'string', begin: '"', end: '"', contains: [hljs.BACKSLASH_ESCAPE] },
                    { className: 'number', begin: '\\b[0-9]*\\.[0-9]+([eE][+-]?[0-9]+)?' }
                ]
            };
        });
    </script>

</body>
</html>
