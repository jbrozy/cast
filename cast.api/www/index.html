<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Editor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 1px;
            background-color: #2d2d2d;
        }

        .pane {
            background-color: #252526;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e42;
        }

        .pane:last-child {
            border-right: none;
        }

        .file-explorer {
            width: 250px;
            flex-shrink: 0;
        }

        .editor-pane {
            flex: 1;
        }

        .output-pane {
            flex: 1;
        }

        .editor-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        .pane-header {
            background-color: #2d2d30;
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 1px solid #3e3e42;
            color: #cccccc;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            box-sizing: border-box;
        }

        .pane-footer {
            padding: 8px;
            border-top: 1px solid #3e3e42;
            background-color: #2d2d30;
            display: flex;
            justify-content: flex-start;
        }

        #graph-btn {
            padding: 4px 12px !important;
            background: #1e88e5 !important;
            color: white !important;
            border: none !important;
            cursor: pointer !important;
            border-radius: 3px !important;
            font-size: 11px !important;
            font-weight: 500 !important;
            flex-shrink: 0;
            margin-left: auto;
        }
        
        #test-btn {
            padding: 4px 12px !important;
            background: #1e88e5 !important;
            color: white !important;
            border: none !important;
            cursor: pointer !important;
            border-radius: 3px !important;
            font-size: 11px !important;
            font-weight: 500 !important;
            flex-shrink: 0;
            margin-left: auto;
        }

        #test-btn:hover {
            background: #1565c0 !important;
        }

        #test-btn:disabled {
            background: #999 !important;
            cursor: not-allowed !important;
        }

        .editor-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        .line-numbers {
            background-color: #1e1e1e;
            color: #6a9955;
            padding: 8px 12px;
            text-align: right;
            user-select: none;
            border-right: 1px solid #3e3e42;
            overflow: hidden;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }

        .line-number {
            display: block;
            height: 1.5em;
            position: relative;
        }

        .line-number.error {
            background-color: #5c2525;
            color: #ff6b6b;
            font-weight: bold;
            cursor: help;
            position: relative;
        }

        .line-number.error:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 50px;
            top: -5px;
            padding: 8px 12px;
            background-color: #d32f2f;
            color: white;
            font-size: 11px;
            border-radius: 3px;
            font-weight: normal;
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            white-space: pre-wrap;
            max-width: 500px;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .line-number.error:hover {
            z-index: 999;
        }

        .code-editor {
            flex: 1;
            overflow: auto;
            padding: 8px 12px;
            background-color: #1e1e1e;
            font-size: 13px;
            line-height: 1.5;
            color: #d4d4d4;
            border: none;
            resize: none;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            outline: none;
            scrollbar-width: thin;
            scrollbar-color: #464647 #1e1e1e;
        }

        .code-editor::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .code-editor::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .code-editor::-webkit-scrollbar-thumb {
            background: #464647;
            border-radius: 5px;
        }

        .code-editor::-webkit-scrollbar-thumb:hover {
            background: #6a6a6a;
        }

        #output-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background-color: #1e1e1e;
            display: flex;
            flex-direction: column;
        }

        .output-wrapper {
            display: flex;
            gap: 0;
            height: 100%;
            width: 100%;
        }

        .output-line-numbers {
            background-color: #1e1e1e;
            color: #6a9955;
            text-align: right;
            user-select: none;
            border-right: 1px solid #3e3e42;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            min-width: 45px;
            padding: 8px 12px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .output-line-number {
            display: block;
            height: 1.5em;
        }

        .output-code {
            flex: 1;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            overflow: auto;
            white-space: pre;
            color: #d4d4d4;
            padding: 8px 12px;
            background-color: #1e1e1e;
            margin: 0;
        }

        .output-code code {
            background: none;
            padding: 0;
            color: inherit;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
        }

        .hljs {
            background: #1e1e1e !important;
            color: #d4d4d4 !important;
        }

        .errors {
            margin-top: 12px;
            border: 1px solid #e57373;
            border-radius: 4px;
            background-color: #3c2525;
            overflow: scroll;
        }

        .errors-header {
            background-color: #d32f2f;
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 12px;
        }

        .errors ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .errors li {
            padding: 8px 12px;
            border-bottom: 1px solid #5c2525;
            color: #f1b3b3;
            font-size: 12px;
        }

        .errors li:last-child {
            border-bottom: none;
        }

        .success-message {
            padding: 8px 12px;
            background-color: #1b5e20;
            color: #81c784;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .loading-indicator {
            display: inline-block;
            padding: 4px 8px;
            background-color: #1e3a8a;
            color: #60a5fa;
            border-radius: 3px;
            font-size: 11px;
            margin-left: 8px;
            font-weight: 500;
        }

        /* GLSL Syntax Highlighting anpassen */
        .hljs-keyword { color: #569cd6; }
        .hljs-literal { color: #569cd6; }
        .hljs-built_in { color: #c8e6c9; }
        .hljs-type { color: #4fc3f7; }
        .hljs-number { color: #b5cea8; }
        .hljs-string { color: #ce9178; }
        .hljs-comment { color: #6a9955; }
        .hljs-attr { color: #9cdcfe; }
        .hljs-function { color: #dcdcaa; }

        /* File Explorer Styles */
        #file-list {
            font-size: 12px;
        }

        .file-item {
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
            margin: 2px 0;
            display: flex;
            align-items: center;
            color: #cccccc;
        }

        .file-item:hover {
            background-color: #37373d;
        }

        .file-item.active {
            background-color: #094771;
            color: #ffffff;
        }

        .file-item .file-icon {
            margin-right: 6px;
            font-size: 11px;
        }

        .file-item .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-item .delete-btn {
            opacity: 0;
            margin-left: 4px;
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 10px;
            padding: 2px;
            border-radius: 2px;
            width: 16px;
            height: 16px;
            text-align: center;
            line-height: 12px;
        }

        .file-item:hover .delete-btn {
            opacity: 1;
        }

        .file-item .delete-btn:hover {
            background-color: #ff6b6b;
            color: white;
        }

        .file-item .add-fragment-btn {
            opacity: 0;
            margin-left: 4px;
            background: none;
            border: none;
            color: #4caf50;
            cursor: pointer;
            font-size: 10px;
            padding: 2px;
            border-radius: 2px;
            font-weight: bold;
            width: 16px;
            height: 16px;
            text-align: center;
            line-height: 12px;
        }

        .file-item:hover .add-fragment-btn {
            opacity: 1;
        }

        .file-item .add-fragment-btn:hover {
            background-color: #4caf50;
            color: white;
        }

        /* Modal Styles */
        .modal-container {
            padding: 8px;
            background: #2d2d30;
            border: 1px solid #3e3e42;
            margin: 4px 0;
        }
        .modal-input {
            width: 100%;
            padding: 4px;
            margin-bottom: 4px;
            background: #37373d;
            color: #cccccc;
            border: 1px solid #569cd6;
            border-radius: 3px;
            font-size: 12px;
        }
        .modal-btn-primary {
            padding: 4px 8px; background: #1e88e5; color: white; border: none; border-radius: 3px; cursor: pointer;
        }
        .modal-btn-secondary {
            padding: 4px 8px; background: #666; color: white; border: none; border-radius: 3px; cursor: pointer;
        }

        /* Theme Transitions */
        body, .container, .pane, .pane-header, .pane-footer, .line-numbers, .code-editor, 
        #output-container, .output-line-numbers, .output-code, .file-item, .modal-container, 
        .modal-input, .hljs, [class^="hljs-"] {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        /* Light Mode Styles */
        body.light-mode { background-color: #f3f3f3; color: #333333; }
        body.light-mode .container { background-color: #e0e0e0; }
        body.light-mode .pane { background-color: #ffffff; border-right: 1px solid #cccccc; }
        body.light-mode .pane-header { background-color: #f3f3f3; border-bottom: 1px solid #cccccc; color: #333333; }
        body.light-mode .pane-footer { border-top: 1px solid #cccccc; background-color: #f3f3f3; }
        body.light-mode .line-numbers { background-color: #f9f9f9; color: #2b91af; border-right: 1px solid #cccccc; }
        body.light-mode .code-editor { background-color: #ffffff; color: #333333; scrollbar-color: #c1c1c1 #ffffff; }
        body.light-mode .code-editor::-webkit-scrollbar-track { background: #ffffff; }
        body.light-mode .code-editor::-webkit-scrollbar-thumb { background: #c1c1c1; }
        body.light-mode .code-editor::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        body.light-mode #output-container { background-color: #ffffff; }
        body.light-mode .output-line-numbers { background-color: #f9f9f9; color: #2b91af; border-right: 1px solid #cccccc; }
        body.light-mode .output-code { color: #333333; background-color: #ffffff; }
        body.light-mode .hljs { background: #ffffff !important; color: #333333 !important; }
        body.light-mode .file-item { color: #333333; }
        body.light-mode .file-item:hover { background-color: #e8e8e8; }
        body.light-mode .file-item.active { background-color: #007acc; color: #ffffff; }
        body.light-mode .errors { border: 1px solid #ffbaba; background-color: #ffeded; }
        body.light-mode .errors-header { background-color: #d8000c; color: white; }
        body.light-mode .errors li { border-bottom: 1px solid #ffbaba; color: #d8000c; }
        body.light-mode .hljs-keyword { color: #0000ff; }
        body.light-mode .hljs-literal { color: #0000ff; }
        body.light-mode .hljs-built_in { color: #795e26; }
        body.light-mode .hljs-type { color: #267f99; }
        body.light-mode .hljs-number { color: #098658; }
        body.light-mode .hljs-string { color: #a31515; }
        body.light-mode .hljs-comment { color: #008000; }
        body.light-mode .hljs-attr { color: #001080; }
        body.light-mode .hljs-function { color: #795e26; }
        
        body.light-mode .modal-container { background: #f3f3f3; border-color: #cccccc; }
        body.light-mode .modal-input { background: #ffffff; color: #333333; border-color: #007acc; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Linkes Fenster: File Explorer -->
        <div class="pane file-explorer">
            <div class="pane-header">
                <span>Shader Files</span>
                <div>
                    <button id="new-pass-btn" type="button" style="padding: 4px 8px; background: #1e88e5; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; margin-right: 4px;">New Pass</button>
                    <button id="new-file-btn" type="button" style="padding: 4px 8px; background: #1e88e5; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px;">+</button>
                </div>
            </div>
            <div id="file-list" style="flex: 1; overflow-y: auto; padding: 8px;">
                <!-- Dateien werden hier dynamisch eingefügt -->
            </div>
            <div class="pane-footer">
                <button id="export-btn" type="button" style="padding: 4px 8px; background: #4caf50; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; margin-right: 4px;">Export</button>
                <button id="import-btn" type="button" style="padding: 4px 8px; background: #ff9800; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; margin-right: 4px;">Import</button>
                <button id="reset-btn" type="button" style="padding: 4px 8px; background: #f44336; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px;">Reset Storage</button>
            </div>
        </div>

        <!-- Mittleres Fenster: Code Editor -->
        <div class="pane editor-pane">
            <div class="pane-header">
                <span id="current-file-name">Cast Code</span>
            </div>
            <div class="editor-wrapper">
                <div class="line-numbers" id="editor-line-numbers"></div>
                <textarea 
                    id="code-editor" 
                    class="code-editor" 
                    spellcheck="false"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"></textarea>
            </div>
        </div>
        <div class="pane output-pane">
            <div class="pane-header">
                <span>Compiled Result <span class="loading-indicator" id="loading-status"></span></span>
                <div>
                    <button id="theme-toggle-btn" type="button" style="padding: 4px 8px; background: #555; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; margin-right: 4px;" title="Toggle Light/Dark Mode">☀️</button>
                    <button id="graph-btn">Visualize</button>
                    <button id="test-btn">Test</button>
                </div>
            </div>
            <div id="output-container">
                <p style="color: #888;">The compilation result will be displayed here. Start by entering code in the left window.</p>
            </div>
        </div>

    </div>

    <script>
        let shaderFiles = {};
        try {
            const stored = localStorage.getItem('shaderFiles');
            if (stored) {
                shaderFiles = JSON.parse(stored);
            }
        } catch (e) {
            console.warn('Error loading shader files from localStorage:', e);
            shaderFiles = {};
        }
        let currentPath = null;

        let fileList, newFileBtn, newPassBtn, currentFileNameEl;

        function getFileByPath(path) {
            if (path.length === 0) return null;
            const [stage, ...rest] = path;
            if (!shaderFiles[stage]) return null;
            let current = shaderFiles[stage];
            for (let i of rest) {
                if (current && Array.isArray(current) && current[i]) {
                    current = current[i];
                } else if (current && current.children && Array.isArray(current.children) && current.children[i]) {
                    current = current.children[i];
                } else {
                    return null;
                }
            }
            return current;
        }

        function updateCurrentFileName() {
            const file = getFileByPath(currentPath);
            if (file) {
                currentFileNameEl.textContent = file.name;
            } else {
                currentFileNameEl.textContent = 'Cast Code';
            }
        }

        function renderFileList(container = fileList, level = 0) {
            if (level === 0) {
                container.innerHTML = '';
            }
            const stages = Object.keys(shaderFiles).sort();
            stages.forEach(stage => {
                if (!shaderFiles[stage] || !Array.isArray(shaderFiles[stage])) {
                    shaderFiles[stage] = [];
                }

                const stageItem = document.createElement('div');
                stageItem.className = 'file-item';
                stageItem.style.paddingLeft = `${level * 20 + 8}px`;
                stageItem.innerHTML = `<span class="file-icon">📁</span><span class="file-name">${stage.replace('_', ' ').toUpperCase()}</span>`;
                container.appendChild(stageItem);

                renderStage(container, shaderFiles[stage], [stage], level + 1);
            });
            if (level === 0) {
                updateCurrentFileName();
            }
        }

        function renderStage(container, files, path, level) {
            files.forEach((file, index) => {
                const itemPath = path.concat(index);
                const isActive = JSON.stringify(itemPath) === JSON.stringify(currentPath);
                const fileItem = document.createElement('div');
                fileItem.className = `file-item ${isActive ? 'active' : ''}`;
                fileItem.style.paddingLeft = `${level * 20 + 8}px`;
                let buttons = `<button class="delete-btn" onclick="deleteFile('${itemPath.join(',')}')">×</button>`;
                if (file.name.endsWith('.vsh')) {
                    buttons += `<button class="add-fragment-btn" title="Fragment Shader hinzufügen" onclick="addFragmentShader('${itemPath.join(',')}')">F</button>`;
                }
                let icon = '📄';
                if (file.name.endsWith('.vsh')) {
                    icon = '🔺'; // Vertex Shader Icon
                } else if (file.name.endsWith('.fsh')) {
                    icon = '🎨'; // Fragment Shader Icon
                } else if (file.children && file.children.length > 0) {
                    icon = '📁';
                }
                fileItem.innerHTML = `
                    <span class="file-icon">${icon}</span>
                    <span class="file-name">${file.name}</span>
                    ${buttons}
                `;
                fileItem.onclick = () => selectFile(itemPath);
                container.appendChild(fileItem);

                if (file.children && file.children.length > 0) {
                    renderStage(container, file.children, itemPath, level + 1);
                }
            });
        }

        function addFragmentShader(vertexPathStr) {
            const parts = vertexPathStr.split(',');
            const stage = parts[0];
            const indices = parts.slice(1).map(Number);
            const vertexPath = [stage, ...indices];
            const vertexFile = getFileByPath(vertexPath);
            if (!vertexFile || !vertexFile.name.endsWith('.vsh')) return;
            
            const baseName = vertexFile.name.replace('.vsh', '');
            const fragmentName = baseName + '.fsh';
            
            if (vertexFile.children && vertexFile.children.some(child => child.name === fragmentName)) {
                alert('Fragment Shader already exists for this vertex shader.');
                return;
            }
            
            const newFragment = {
                name: fragmentName,
                content: '#version 330\n\nvoid main() {\n    // Fragment shader code for ' + baseName + '\n}',
                children: undefined
            };
            
            if (!vertexFile.children) vertexFile.children = [];
            vertexFile.children.push(newFragment);
            
            saveFiles();
            renderFileList();
        }

        function importProject() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const importedData = JSON.parse(event.target.result);
                            shaderFiles = importedData;
                            saveFiles();
                            renderFileList();
                            // Setze currentPath auf erste verfügbare Datei
                            const stages = Object.keys(shaderFiles).sort();
                            if (stages.length > 0) {
                                const firstStage = stages[0];
                                if (shaderFiles[firstStage].length > 0) {
                                    currentPath = [firstStage, 0];
                                }
                            }
                            loadCurrentFile();
                        } catch (error) {
                            alert('Error importing: ' + error.message);
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // Projekt exportieren
        function exportProject() {
            const exportData = {};
            Object.keys(shaderFiles).forEach(stage => {
                if (stage !== 'shadow') {
                    exportData[stage] = shaderFiles[stage];
                }
            });
            const dataStr = JSON.stringify(exportData, null, 2);
            if (dataStr === '{}' || dataStr.length < 10) {
                alert('No data to export found. Add files first.');
                return;
            }
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'shader-project.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function createNewFile(e) {
            if (e) e.preventDefault();
            const container = document.createElement('div');
            container.className = 'modal-container';
            
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.placeholder = 'Dateiname eingeben...';
            nameInput.className = 'modal-input';
            
            const typeSelect = document.createElement('select');
            typeSelect.className = 'modal-input';
            typeSelect.innerHTML = '<option value="vertex">Vertex Shader</option><option value="fragment">Fragment Shader</option>';
            
            const stageSelect = document.createElement('select');
            stageSelect.className = 'modal-input';
            function populateStages() {
                stageSelect.innerHTML = '';
                Object.keys(shaderFiles).sort().forEach(stage => {
                    const option = document.createElement('option');
                    option.value = stage;
                    option.textContent = stage.replace('_', ' ').toUpperCase();
                    stageSelect.appendChild(option);
                });
            }
            populateStages();
            
            const parentSelect = document.createElement('select');
            parentSelect.className = 'modal-input';
            parentSelect.innerHTML = '<option value="">Kein Parent (Root)</option>';
            
            function populateParents() {
                const selectedStage = stageSelect.value;
                parentSelect.innerHTML = '<option value="">Kein Parent (Root)</option>';
                if (shaderFiles[selectedStage]) {
                    function addOptions(files, path = []) {
                        files.forEach((file, index) => {
                            if (file.children) {
                                const option = document.createElement('option');
                                option.value = path.concat(index).join(',');
                                option.textContent = '  '.repeat(path.length) + file.name;
                                parentSelect.appendChild(option);
                                addOptions(file.children, path.concat(index));
                            }
                        });
                    }
                    addOptions(shaderFiles[selectedStage]);
                }
            }
            stageSelect.addEventListener('change', populateParents);
            populateParents();
            
            container.appendChild(nameInput);
            container.appendChild(typeSelect);
            container.appendChild(stageSelect);
            container.appendChild(parentSelect);
            
            const buttons = document.createElement('div');
            buttons.style.cssText = 'display: flex; gap: 4px;';
            const okBtn = document.createElement('button');
            okBtn.textContent = 'Erstellen';
            okBtn.className = 'modal-btn-primary';
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Abbrechen';
            cancelBtn.className = 'modal-btn-secondary';
            buttons.appendChild(okBtn);
            buttons.appendChild(cancelBtn);
            container.appendChild(buttons);
            
            fileList.appendChild(container);
            nameInput.focus();
            
            const removeContainer = () => {
                if (fileList.contains(container)) {
                    fileList.removeChild(container);
                }
            };
            
            okBtn.onclick = () => {
                let fileName = nameInput.value.trim();
                const type = typeSelect.value;
                const stage = stageSelect.value;
                const parentPath = parentSelect.value ? parentSelect.value.split(',').map(Number) : null;
                
                if (fileName && stage) {
                    fileName = fileName.replace(/\.(vsh|fsh)$/i, '');
                    const extension = type === 'vertex' ? '.vsh' : '.fsh';
                    const finalName = fileName + extension;
                    
                    if (!shaderFiles[stage]) shaderFiles[stage] = [];
                    
                    const newFile = {
                        name: finalName,
                        content: type === 'vertex' ? '#version 330\n\nvoid main() {\n    // Vertex shader code for ' + stage + '\n}' : '#version 330\n\nvoid main() {\n    // Fragment shader code for ' + stage + '\n}',
                        children: type === 'vertex' ? [] : undefined
                    };
                    
                    if (parentPath) {
                        const parent = getFileByPath([stage, ...parentPath]);
                        if (parent && parent.children) {
                            parent.children.push(newFile);
                        } else {
                            shaderFiles[stage].push(newFile); // Fallback
                        }
                    } else {
                        shaderFiles[stage].push(newFile);
                    }
                    
                    saveFiles();
                    renderFileList();
                    removeContainer();
                }
            };
            
            cancelBtn.onclick = removeContainer;
            
            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') okBtn.click();
                if (e.key === 'Escape') cancelBtn.click();
            });
        }

        function createNewPass() {
            const container = document.createElement('div');
            container.className = 'modal-container';
            
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.placeholder = 'Pass-Name eingeben...';
            nameInput.className = 'modal-input';
            
            const typeSelect = document.createElement('select');
            typeSelect.className = 'modal-input';
            typeSelect.innerHTML = `
                <option value="shadow">Shadow Pass</option>
                <option value="depth_only">Depth Only Pass</option>
                <option value="geometry">Geometry Pass</option>
                <option value="fullscreen">Fullscreen Pass</option>
                <option value="forward">Forward Pass</option>
                <option value="post_process">Post Process Pass</option>
                <option value="custom">Custom Pass</option>
            `;
            
            container.appendChild(nameInput);
            container.appendChild(typeSelect);
            
            const buttons = document.createElement('div');
            buttons.style.cssText = 'display: flex; gap: 4px;';
            const okBtn = document.createElement('button');
            okBtn.textContent = 'Erstellen';
            okBtn.className = 'modal-btn-primary';
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Abbrechen';
            cancelBtn.className = 'modal-btn-secondary';
            buttons.appendChild(okBtn);
            buttons.appendChild(cancelBtn);
            container.appendChild(buttons);
            
            fileList.appendChild(container);
            nameInput.focus();
            
            const removeContainer = () => {
                if (fileList.contains(container)) {
                    fileList.removeChild(container);
                }
            };
            
            okBtn.onclick = () => {
                const passName = nameInput.value.trim();
                const passType = typeSelect.value;
                
                if (passName && !shaderFiles[passName]) {
                    shaderFiles[passName] = [];
                    saveFiles();
                    renderFileList();
                    removeContainer();
                } else if (shaderFiles[passName]) {
                    alert('Pass name already exists.');
                }
            };
            
            cancelBtn.onclick = removeContainer;
            
            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') okBtn.click();
                if (e.key === 'Escape') cancelBtn.click();
            });
        }

        // Datei auswählen
        function selectFile(path) {
            try {
                saveCurrentFile();
                currentPath = path;
                const file = getFileByPath(currentPath);
                if (!file) {
                    console.error('File not found at path:', currentPath);
                    return;
                }
                renderFileList();
                loadCurrentFile();
            } catch (error) {
                console.error('Error selecting file:', error);
            }
        }

        function loadCurrentFile() {
            try {
                const file = getFileByPath(currentPath);
                if (file) {
                    codeEditor.value = file.content;
                    updateLineNumbers();
                    codeEditor.dispatchEvent(new Event('input'));
                } else {
                    console.warn('File not found for currentPath:', currentPath);
                    codeEditor.value = '';
                }
                updateCurrentFileName();
            } catch (error) {
                console.error('Error loading current file:', error);
            }
        }

        // Datei löschen
        function deleteFile(pathStr) {
            const path = pathStr.split(',');
            const stage = path[0];
            const rest = path.slice(1).map(Number);
            const file = getFileByPath(path);
            if (confirm(`Delete "${file ? file.name : 'file'}"?`)) {
                // Entferne aus der Struktur
                function removeFrom(files, path) {
                    if (path.length === 1) {
                        files.splice(path[0], 1);
                    } else {
                        const parent = files[path[0]];
                        if (parent && parent.children) {
                            removeFrom(parent.children, path.slice(1));
                        }
                    }
                }
                removeFrom(shaderFiles[stage], rest);
                
                // Passe currentPath an
                if (JSON.stringify(currentPath.slice(0, path.length)) === JSON.stringify(path)) {
                    currentPath = ['shadow', 0]; // Fallback
                }
                
                saveFiles();
                renderFileList();
                loadCurrentFile();
            }
        }

        // Dateien speichern
        function saveFiles() {
            localStorage.setItem('shaderFiles', JSON.stringify(shaderFiles));
        }

        // Aktuelle Datei speichern (beim Bearbeiten)
        function saveCurrentFile() {
            const file = getFileByPath(currentPath);
            if (file) {
                file.content = codeEditor.value;
                saveFiles();
            }
        }

        // Event Listener für neue Datei
        // onclick im HTML

        // Event Listener für neuen Pass
        // onclick im HTML

        // Tastatur-Shortcuts für Dateiwechsel
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Tab') {
                e.preventDefault();
                const nextIndex = (currentFileIndex + 1) % shaderFiles.length;
                selectFile(nextIndex);
            } else if (e.ctrlKey && e.shiftKey && e.key === 'Tab') {
                e.preventDefault();
                const prevIndex = (currentFileIndex - 1 + shaderFiles.length) % shaderFiles.length;
                selectFile(prevIndex);
            }
        });

        window.onload = function() {
            fileList = document.getElementById('file-list');
            currentFileNameEl = document.getElementById('current-file-name');

            // Theme setup
            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            const currentTheme = localStorage.getItem('theme') || 'dark';
            
            if (currentTheme === 'light') {
                document.body.classList.add('light-mode');
                if (themeToggleBtn) themeToggleBtn.textContent = '🌙';
            }
            
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    document.body.classList.toggle('light-mode');
                    const isLight = document.body.classList.contains('light-mode');
                    localStorage.setItem('theme', isLight ? 'light' : 'dark');
                    themeToggleBtn.textContent = isLight ? '🌙' : '☀️';
                });
            }

            // Setze onclick für Buttons
            const newFileBtn = document.getElementById('new-file-btn');
            const newPassBtn = document.getElementById('new-pass-btn');
            const exportBtn = document.getElementById('export-btn');
            const importBtn = document.getElementById('import-btn');
            const resetBtn = document.getElementById('reset-btn');
            if (newFileBtn) newFileBtn.onclick = createNewFile;
            if (newPassBtn) newPassBtn.onclick = createNewPass;
            if (exportBtn) exportBtn.onclick = exportProject;
            if (importBtn) importBtn.onclick = importProject;
            if (resetBtn) resetBtn.onclick = () => {
                if (confirm('Are you sure you want to reset all stored data? This cannot be undone.')) {
                    localStorage.clear();
                    location.reload();
                }
            };

            // Initialisierung: Falls keine Dateien vorhanden, erstelle eine Standarddatei
            // Stelle sicher, dass currentPath gültig ist
            if (Object.keys(shaderFiles).length > 0) {
                // Wenn Dateien vorhanden, setze currentPath auf die erste verfügbare Datei
                const stages = Object.keys(shaderFiles).sort();
                if (stages.length > 0) {
                    const firstStage = stages[0];
                    if (shaderFiles[firstStage].length > 0) {
                        currentPath = [firstStage, 0];
                    }
                }
            }

            // Render initial file list
            renderFileList();
            if (currentPath) {
                loadCurrentFile();
            }
        };

        const DEBOUNCE_TIME_MS = 500;
        const API_ENDPOINT = '/api/compile';
        const TEST_ENDPOINT = '/api/test';

        const codeEditor = document.getElementById('code-editor');
        const lineNumbersContainer = document.getElementById('editor-line-numbers');
        const outputContainer = document.getElementById('output-container');
        const loadingStatus = document.getElementById('loading-status');
        const testBtn = document.getElementById('test-btn');
        const visualizeButton = document.getElementById('graph-btn');

        // Test-Button Funktionalität
        testBtn.addEventListener('click', async () => {
            console.log('🔧 Testing backend connection...');
            testBtn.disabled = true;
            testBtn.textContent = 'Testing...';
            
            try {
                const response = await fetch(TEST_ENDPOINT);
                const data = await response.json();
                console.log('✅ Backend test successful:', data);
                alert('✅ Backend is running and reachable!\n\n' + JSON.stringify(data, null, 2));
                testBtn.textContent = 'Test';
                testBtn.disabled = false;
            } catch (error) {
                console.error('❌ Backend test failed:', error);
                alert('❌ Error! Backend is not reachable.\n\nError: ' + error.message);
                testBtn.textContent = 'Test';
                testBtn.disabled = false;
            }
        });

        function htmlEscape(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function updateLineNumbers() {
            const lines = codeEditor.value.split('\n').length;
            lineNumbersContainer.innerHTML = '';
            for (let i = 1; i <= lines; i++) {
                const lineNum = document.createElement('div');
                lineNum.className = 'line-number';
                lineNum.textContent = i;
                lineNumbersContainer.appendChild(lineNum);
            }
        }

        updateLineNumbers();

        codeEditor.addEventListener('scroll', () => {
            lineNumbersContainer.scrollTop = codeEditor.scrollTop;
        });

        let debounceTimer = null;
        let abortController = null;
        codeEditor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                
                const start = codeEditor.selectionStart;
                const end = codeEditor.selectionEnd;
                const value = codeEditor.value;
                
                if (start !== end) {
                    const beforeSelection = value.substring(0, start);
                    const selectedText = value.substring(start, end);
                    const afterSelection = value.substring(end);
                    
                    let lineStart = beforeSelection.lastIndexOf('\n') + 1;
                    const linesInSelection = selectedText.split('\n');
                    const indentedLines = linesInSelection.map((line, i) => {
                        return '\t' + line;
                    }).join('\n');
                    
                    codeEditor.value = beforeSelection + indentedLines + afterSelection;
                    codeEditor.selectionStart = start + 1;
                    codeEditor.selectionEnd = end + linesInSelection.length;
                } else {
                    codeEditor.value = value.substring(0, start) + '\t' + value.substring(end);
                    codeEditor.selectionStart = codeEditor.selectionEnd = start + 1;
                }
                codeEditor.dispatchEvent(new Event('input'));
            } else if (e.key === '(') {
                e.preventDefault();
                const start = codeEditor.selectionStart;
                const end = codeEditor.selectionEnd;
                const value = codeEditor.value;
                const selectedText = value.substring(start, end);
                
                codeEditor.value = value.substring(0, start) + '(' + selectedText + ')' + value.substring(end);
                codeEditor.selectionStart = start + 1;
                if (start === end) {
                    codeEditor.selectionEnd = start + 1;
                } else {
                    codeEditor.selectionEnd = end + 1;
                }
                codeEditor.dispatchEvent(new Event('input'));
            } else if (e.key === '{') {
                e.preventDefault();
                const start = codeEditor.selectionStart;
                const end = codeEditor.selectionEnd;
                const value = codeEditor.value;
                const selectedText = value.substring(start, end);
                
                codeEditor.value = value.substring(0, start) + '{' + selectedText + '}' + value.substring(end);
                codeEditor.selectionStart = start + 1;
                if (start === end) {
                    codeEditor.selectionEnd = start + 1;
                } else {
                    codeEditor.selectionEnd = end + 1;
                }
                codeEditor.dispatchEvent(new Event('input'));
            } else if (e.key === '[') {
                e.preventDefault();
                const start = codeEditor.selectionStart;
                const end = codeEditor.selectionEnd;
                const value = codeEditor.value;
                const selectedText = value.substring(start, end);
                
                codeEditor.value = value.substring(0, start) + '[' + selectedText + ']' + value.substring(end);
                codeEditor.selectionStart = start + 1;
                if (start === end) {
                    codeEditor.selectionEnd = start + 1;
                } else {
                    codeEditor.selectionEnd = end + 1;
                }
                codeEditor.dispatchEvent(new Event('input'));
            } else if (e.key === '"') {
                e.preventDefault();
                const start = codeEditor.selectionStart;
                const end = codeEditor.selectionEnd;
                const value = codeEditor.value;
                const selectedText = value.substring(start, end);
                
                codeEditor.value = value.substring(0, start) + '"' + selectedText + '"' + value.substring(end);
                codeEditor.selectionStart = start + 1;
                if (start === end) {
                    codeEditor.selectionEnd = start + 1;
                } else {
                    codeEditor.selectionEnd = end + 1;
                }
                codeEditor.dispatchEvent(new Event('input'));
            } else if (e.key === "'") {
                e.preventDefault();
                const start = codeEditor.selectionStart;
                const end = codeEditor.selectionEnd;
                const value = codeEditor.value;
                const selectedText = value.substring(start, end);
                
                codeEditor.value = value.substring(0, start) + "'" + selectedText + "'" + value.substring(end);
                codeEditor.selectionStart = start + 1;
                if (start === end) {
                    codeEditor.selectionEnd = start + 1;
                } else {
                    codeEditor.selectionEnd = end + 1;
                }
                codeEditor.dispatchEvent(new Event('input'));
            }
        });

        codeEditor.addEventListener('input', () => {
            updateLineNumbers();
            saveCurrentFile();
            
            if (debounceTimer !== null) {
                clearTimeout(debounceTimer);
                debounceTimer = null;
            }
            
            if (abortController !== null) {
                abortController.abort();
            }
            abortController = new AbortController();
            
            loadingStatus.textContent = 'transpiling...';
            loadingStatus.style.display = 'inline-block';
            
            debounceTimer = setTimeout(() => {
                const code = codeEditor.value;
                
                console.log('📤 Sending compile request...');
                console.log('Code length:', code.length);
                console.log('Code preview:', code.substring(0, 100));
                
                fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ Input: code }),
                    signal: abortController.signal
                })
                .then(response => {
                    console.log('Response status:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('✅ Response received:', data);
                    
                    let htmlResponse = '';
                    let errorMap = {};
                    if (data.errors && data.errors.length > 0) {
                        data.errors.forEach(err => {
                            const match = err.match(/\[Line (\d+):/);
                            if (match) {
                                const lineNum = parseInt(match[1]);
                                errorMap[lineNum] = err;
                            }
                        });
                    }
                    
                    document.querySelectorAll('.line-number').forEach((lineEl, index) => {
                        const lineNum = index + 1;
                        if (errorMap[lineNum]) {
                            lineEl.classList.add('error');
                            lineEl.setAttribute('data-tooltip', errorMap[lineNum]);
                        } else {
                            lineEl.classList.remove('error');
                            lineEl.removeAttribute('data-tooltip');
                        }
                    });
                    
                    if (data.result && data.result.trim()) {
                        let normalizedResult = data.result.replace(/\r\n/g, '\n');
                        
                        try {
                            normalizedResult = js_beautify(normalizedResult, {
                                indent_size: 1,
                                indent_char: '  ',
                                preserve_newlines: true,
                                max_preserve_newlines: 2
                            });
                        } catch (e) {
                            console.log('Formatierung fehlgeschlagen, verwende Original:', e);
                        }
                        
                        const lines = normalizedResult.split('\n');
                        
                        const lineNumbersHtml = lines.map((_, i) => `<div class="output-line-number">${i + 1}</div>`).join('');
                        const escapedResult = normalizedResult.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        htmlResponse += `<div class="output-wrapper"><div class="output-line-numbers">${lineNumbersHtml}</div><div class="output-code"><code class="language-glsl hljs">${escapedResult}</code></div></div>`;
                        
                        setTimeout(() => {
                            const outputCode = outputContainer.querySelector('.output-code');
                            const outputLineNumbers = outputContainer.querySelector('.output-line-numbers');
                            if (outputCode && outputLineNumbers) {
                                outputCode.addEventListener('scroll', () => {
                                    outputLineNumbers.scrollTop = outputCode.scrollTop;
                                });
                            }
                        }, 0);
                    }
                    
                    if (data.errors && data.errors.length > 0) {
                        const errorItems = data.errors.map(err => {
                            const match = err.match(/\[Line (\d+):(\d+)\]\s*(.*)/);
                            if (match) {
                                const [, line, column, rest] = match;
                                return `<li><strong>Line Nr: ${(parseInt(line))}:${column}</strong><br>${htmlEscape(rest)}</li>`;
                            }
                            return `<li>${err}</li>`;
                        }).join('');

                        htmlResponse += `<div class="errors"><div class="errors-header">⚠️ ${data.errors.length} Error while transpiling:</div><ul>${errorItems}</ul></div>`;
                    }
                    // Fallback wenn kein Ergebnis
                    if (!data.result && (!data.errors || data.errors.length === 0)) {
                        htmlResponse = '<p style="color: #81c784;">✅ Successfully transpiled to GLSL!</p>';
                    }
                    
                    outputContainer.innerHTML = htmlResponse;
                    hljs.highlightAll();
                    
                    loadingStatus.textContent = '✅ updated';
                    setTimeout(() => {
                        loadingStatus.textContent = '';
                        loadingStatus.style.display = 'none';
                    }, 2000);
                })
                .catch(error => {
                    if (error.name === 'AbortError') {
                        console.log('Compile request aborted due to new input.');
                        return;
                    }
                    console.error('❌ Compile request failed:', error);
                    loadingStatus.textContent = '❌ Error';
                    outputContainer.innerHTML = '<p style="color: #ff6b6b;">❌ Error while compiling!<br>' + error.message + '<br><br>Make sure the backend server is running on port 5264.</p>';
                });
            }, DEBOUNCE_TIME_MS);
        });

                    built_in: 'radians degrees sin cos tan asin acos atan sinh cosh tanh asinh acosh atanh pow exp log exp2 log2 sqrt inversesqrt ' +

                        'texelFetch texelFetchOffset textureProjOffset textureLodOffset textureProjLodOffset textureGrad textureGradOffset ' +
                        'texture1D texture1DProj texture1DLod texture1DProjLod texture2D texture2DProj texture2DLod texture2DProjLod texture3D ' +
                        'texture3DProj texture3DLod texture3DProjLod textureCube textureCubeLod shadow texture1DArray texture2DArray ' +
                        'textureBuffer texelFetch textureGather dFdx dFdy fwidth interpolateAtCentroid interpolateAtSample interpolateAtOffset ' +
                        'noise1 noise2 noise3 noise4 EmitStreamVertex EndStreamPrimitive EmitVertex EndPrimitive barrier memoryBarrier memoryBarrierAtomicCounter ' +
                        'memoryBarrierBuffer memoryBarrierShared memoryBarrierImage groupMemoryBarrier atomicCounterIncrement atomicCounterDecrement ' +
                        'atomicCounter atomicAdd atomicMin atomicMax atomicAnd atomicOr atomicXor atomicExchange atomicCompSwap imageSize imageLoad ' +
                        'imageStore atomicCounterIncrement atomicCounterDecrement atomicCounter atomicAdd atomicMin atomicMax atomicAnd atomicOr atomicXor ' +
                        'atomicExchange atomicCompSwap imageAtomicCounterIncrement imageAtomicCounterDecrement imageAtomicCounter imageAtomicAdd imageAtomicMin ' +
                        'imageAtomicMax imageAtomicAnd imageAtomicOr imageAtomicXor imageAtomicExchange imageAtomicCompSwap uaddCarry usubBorrow umulExtended ' +
                        'imulExtended bitfieldExtract bitfieldInsert bitfieldReverse bitCount findLSB findMSB gl_FragCoord'
                },
                contains: [
                    hljs.C_LINE_COMMENT_MODE,
                    hljs.C_BLOCK_COMMENT_MODE,
                    hljs.C_NUMBER_MODE,
                    {
                        className: 'string',
                        begin: '"', end: '"',
                        contains: [hljs.BACKSLASH_ESCAPE]
                    },
                    {
                        className: 'number',
                        begin: '\\b[0-9]*\\.[0-9]+([eE][+-]?[0-9]+)?',
                    }
                ]
            };
        });
