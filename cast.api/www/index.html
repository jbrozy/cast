<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLSL Code Editor mit HTMX</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 1px;
            background-color: #2d2d2d;
        }

        .pane {
            flex: 1;
            background-color: #252526;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e42;
        }

        .pane:last-child {
            border-right: none;
        }

        .editor-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        .pane-header {
            background-color: #2d2d30;
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 1px solid #3e3e42;
            color: #cccccc;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            box-sizing: border-box;
        }

        #test-btn {
            padding: 4px 12px !important;
            background: #1e88e5 !important;
            color: white !important;
            border: none !important;
            cursor: pointer !important;
            border-radius: 3px !important;
            font-size: 11px !important;
            font-weight: 500 !important;
            flex-shrink: 0;
            margin-left: auto;
        }

        #test-btn:hover {
            background: #1565c0 !important;
        }

        #test-btn:disabled {
            background: #999 !important;
            cursor: not-allowed !important;
        }

        .editor-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        .line-numbers {
            background-color: #1e1e1e;
            color: #6a9955;
            padding: 8px 12px;
            text-align: right;
            user-select: none;
            border-right: 1px solid #3e3e42;
            overflow: hidden;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }

        .line-number {
            display: block;
            height: 1.5em;
            position: relative;
        }

        .line-number.error {
            background-color: #5c2525;
            color: #ff6b6b;
            font-weight: bold;
            cursor: help;
            position: relative;
        }

        .line-number.error:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 50px;
            top: -5px;
            padding: 8px 12px;
            background-color: #d32f2f;
            color: white;
            font-size: 11px;
            border-radius: 3px;
            font-weight: normal;
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            white-space: normal;
            max-width: 400px;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .line-number.error:hover {
            z-index: 999;
        }

        .code-editor {
            flex: 1;
            overflow: auto;
            padding: 8px 12px;
            background-color: #1e1e1e;
            font-size: 13px;
            line-height: 1.5;
            color: #d4d4d4;
            border: none;
            resize: none;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            outline: none;
            scrollbar-width: thin;
            scrollbar-color: #464647 #1e1e1e;
        }

        .code-editor::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .code-editor::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .code-editor::-webkit-scrollbar-thumb {
            background: #464647;
            border-radius: 5px;
        }

        .code-editor::-webkit-scrollbar-thumb:hover {
            background: #6a6a6a;
        }

        #output-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background-color: #1e1e1e;
            display: flex;
            flex-direction: column;
        }

        .output-wrapper {
            display: flex;
            gap: 0;
            height: 100%;
            width: 100%;
        }

        .output-line-numbers {
            background-color: #1e1e1e;
            color: #6a9955;
            text-align: right;
            user-select: none;
            border-right: 1px solid #3e3e42;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            min-width: 45px;
            padding: 8px 12px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .output-line-number {
            display: block;
            height: 1.5em;
        }

        .output-code {
            flex: 1;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            overflow: auto;
            white-space: pre;
            color: #d4d4d4;
            padding: 8px 12px;
            background-color: #1e1e1e;
            margin: 0;
        }

        .output-code code {
            background: none;
            padding: 0;
            color: inherit;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
        }

        .hljs {
            background: #1e1e1e !important;
            color: #d4d4d4 !important;
        }

        .errors {
            margin-top: 12px;
            border: 1px solid #e57373;
            border-radius: 4px;
            background-color: #3c2525;
            overflow: hidden;
        }

        .errors-header {
            background-color: #d32f2f;
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 12px;
        }

        .errors ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .errors li {
            padding: 8px 12px;
            border-bottom: 1px solid #5c2525;
            color: #f1b3b3;
            font-size: 12px;
        }

        .errors li:last-child {
            border-bottom: none;
        }

        .success-message {
            padding: 8px 12px;
            background-color: #1b5e20;
            color: #81c784;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .loading-indicator {
            display: inline-block;
            padding: 4px 8px;
            background-color: #1e3a8a;
            color: #60a5fa;
            border-radius: 3px;
            font-size: 11px;
            margin-left: 8px;
            font-weight: 500;
        }

        /* GLSL Syntax Highlighting anpassen */
        .hljs-keyword { color: #569cd6; }
        .hljs-literal { color: #569cd6; }
        .hljs-built_in { color: #c8e6c9; }
        .hljs-type { color: #4fc3f7; }
        .hljs-number { color: #b5cea8; }
        .hljs-string { color: #ce9178; }
        .hljs-comment { color: #6a9955; }
        .hljs-attr { color: #9cdcfe; }
        .hljs-function { color: #dcdcaa; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="pane">
            <div class="pane-header">GLSL Code (Original Cast)</div>
            <div class="editor-wrapper">
                <div class="line-numbers" id="editor-line-numbers"></div>
                <textarea 
                    id="code-editor" 
                    class="code-editor" 
                    spellcheck="false"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"></textarea>
            </div>
        </div>

        <!-- Rechtes Fenster: Ausgabe vom Server -->
        <div class="pane">
            <div class="pane-header">
                <span>Compiled Result <span class="loading-indicator" id="loading-status"></span></span>
                <button id="test-btn">Test</button>
            </div>
            <div id="output-container">
                <p style="color: #888;">The compilation result will be displayed here. Start by entering code in the left window.</p>
            </div>
        </div>

    </div>

    <script>
        const DEBOUNCE_TIME_MS = 500;
        const API_ENDPOINT = '/api/compile';
        const TEST_ENDPOINT = '/api/test';

        const codeEditor = document.getElementById('code-editor');
        const lineNumbersContainer = document.getElementById('editor-line-numbers');
        const outputContainer = document.getElementById('output-container');
        const loadingStatus = document.getElementById('loading-status');
        const testBtn = document.getElementById('test-btn');

        // Test-Button Funktionalität
        testBtn.addEventListener('click', async () => {
            console.log('🔧 Testing backend connection...');
            testBtn.disabled = true;
            testBtn.textContent = 'Testing...';
            
            try {
                const response = await fetch(TEST_ENDPOINT);
                const data = await response.json();
                console.log('✅ Backend test successful:', data);
                alert('✅ Backend is running and reachable!\n\n' + JSON.stringify(data, null, 2));
                testBtn.textContent = 'Test';
                testBtn.disabled = false;
            } catch (error) {
                console.error('❌ Backend test failed:', error);
                alert('❌ Error! Backend is not reachable.\n\nError: ' + error.message);
                testBtn.textContent = 'Test';
                testBtn.disabled = false;
            }
        });

        function htmlEscape(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function updateLineNumbers() {
            const lines = codeEditor.value.split('\n').length;
            lineNumbersContainer.innerHTML = '';
            for (let i = 1; i <= lines; i++) {
                const lineNum = document.createElement('div');
                lineNum.className = 'line-number';
                lineNum.textContent = i;
                lineNumbersContainer.appendChild(lineNum);
            }
        }

        updateLineNumbers();

        codeEditor.addEventListener('scroll', () => {
            lineNumbersContainer.scrollTop = codeEditor.scrollTop;
        });

        let debounceTimer;
        codeEditor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                
                const start = codeEditor.selectionStart;
                const end = codeEditor.selectionEnd;
                const value = codeEditor.value;
                
                if (start !== end) {
                    const beforeSelection = value.substring(0, start);
                    const selectedText = value.substring(start, end);
                    const afterSelection = value.substring(end);
                    
                    let lineStart = beforeSelection.lastIndexOf('\n') + 1;
                    const linesInSelection = selectedText.split('\n');
                    const indentedLines = linesInSelection.map((line, i) => {
                        return '\t' + line;
                    }).join('\n');
                    
                    codeEditor.value = beforeSelection + indentedLines + afterSelection;
                    codeEditor.selectionStart = start + 1;
                    codeEditor.selectionEnd = end + linesInSelection.length;
                } else {
                    codeEditor.value = value.substring(0, start) + '\t' + value.substring(end);
                    codeEditor.selectionStart = codeEditor.selectionEnd = start + 1;
                }
                codeEditor.dispatchEvent(new Event('input'));
            }
        });

        codeEditor.addEventListener('input', () => {
            updateLineNumbers();
            
            clearTimeout(debounceTimer);
            
            // Loading-Status anzeigen
            loadingStatus.textContent = 'transpiling...';
            loadingStatus.style.display = 'inline-block';
            
            debounceTimer = setTimeout(() => {
                const code = codeEditor.value;
                
                console.log('📤 Sending compile request...');
                console.log('Code length:', code.length);
                console.log('Code preview:', code.substring(0, 100));
                
                fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ Input: code })
                })
                .then(response => {
                    console.log('Response status:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('✅ Response received:', data);
                    
                    let htmlResponse = '';
                    let errorMap = {};
                    if (data.errors && data.errors.length > 0) {
                        data.errors.forEach(err => {
                            const match = err.match(/\[Line (\d+):/);
                            if (match) {
                                const lineNum = parseInt(match[1]) + 1;
                                errorMap[lineNum] = err;
                            }
                        });
                    }
                    
                    document.querySelectorAll('.line-number').forEach((lineEl, index) => {
                        const lineNum = index + 1;
                        if (errorMap[lineNum]) {
                            lineEl.classList.add('error');
                            lineEl.setAttribute('data-tooltip', errorMap[lineNum]);
                        } else {
                            lineEl.classList.remove('error');
                            lineEl.removeAttribute('data-tooltip');
                        }
                    });
                    
                    if (data.result && data.result.trim()) {
                        let normalizedResult = data.result.replace(/\r\n/g, '\n');
                        
                        try {
                            normalizedResult = js_beautify(normalizedResult, {
                                indent_size: 4,
                                indent_char: ' ',
                                preserve_newlines: true,
                                max_preserve_newlines: 2
                            });
                        } catch (e) {
                            console.log('Formatierung fehlgeschlagen, verwende Original:', e);
                        }
                        
                        const lines = normalizedResult.split('\n');
                        
                        const lineNumbersHtml = lines.map((_, i) => `<div class="output-line-number">${i + 1}</div>`).join('');
                        const escapedResult = normalizedResult.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        htmlResponse += `<div class="output-wrapper"><div class="output-line-numbers">${lineNumbersHtml}</div><div class="output-code"><code class="language-glsl hljs">${escapedResult}</code></div></div>`;
                        
                        setTimeout(() => {
                            const outputCode = outputContainer.querySelector('.output-code');
                            const outputLineNumbers = outputContainer.querySelector('.output-line-numbers');
                            if (outputCode && outputLineNumbers) {
                                outputCode.addEventListener('scroll', () => {
                                    outputLineNumbers.scrollTop = outputCode.scrollTop;
                                });
                            }
                        }, 0);
                    }
                    
                    if (data.errors && data.errors.length > 0) {
                        const errorItems = data.errors.map(err => {
                            const match = err.match(/\[Line (\d+):(\d+)\]\s*(.*)/);
                            if (match) {
                                const [, line, column, rest] = match;
                                return `<li><strong>Line Nr: ${(parseInt(line) + 1)}:${column}</strong><br>${htmlEscape(rest)}</li>`;
                            }
                            return `<li>${err}</li>`;
                        }).join('');

                        htmlResponse += `<div class="errors"><div class="errors-header">⚠️ ${data.errors.length} Error while transpiling:</div><ul>${errorItems}</ul></div>`;
                    }
                    // Fallback wenn kein Ergebnis
                    if (!data.result && (!data.errors || data.errors.length === 0)) {
                        htmlResponse = '<p style="color: #81c784;">✅ Successfully transpiled to GLSL!</p>';
                    }
                    
                    outputContainer.innerHTML = htmlResponse;
                    hljs.highlightAll();
                    
                    loadingStatus.textContent = '✅ updated';
                    setTimeout(() => {
                        loadingStatus.textContent = '';
                        loadingStatus.style.display = 'none';
                    }, 2000);
                })
                .catch(error => {
                    console.error('❌ Compile request failed:', error);
                    loadingStatus.textContent = '❌ Error';
                    outputContainer.innerHTML = '<p style="color: #ff6b6b;">❌ Error while compiling!<br>' + error.message + '<br><br>Make sure the backend server is running on port 5264.</p>';
                });
            }, DEBOUNCE_TIME_MS);
        });

        hljs.registerLanguage('glsl', function(hljs) {
            return {
                name: 'GLSL',
                keywords: {
                    keyword: 'attribute uniform varying break continue do for while switch case default if else in out inout const invariant ' +
                        'centroid flat smooth ' +
                        'void discard return mat2 mat3 mat4 dmat2 dmat3 dmat4 mat2x2 mat2x3 mat2x4 mat3x2 mat3x3 mat3x4 mat4x2 mat4x3 mat4x4 ' +
                        'dmat2x2 dmat2x3 dmat2x4 dmat3x2 dmat3x3 dmat3x4 dmat4x2 dmat4x3 dmat4x4 vec2 vec3 vec4 ivec2 ivec3 ivec4 bvec2 bvec3 bvec4 ' +
                        'dvec2 dvec3 dvec4 uint uvec2 uvec3 uvec4 sampler1D sampler2D sampler3D samplerCube sampler1DShadow sampler2DShadow ' +
                        'samplerCubeShadow sampler1DArray sampler2DArray sampler1DArrayShadow sampler2DArrayShadow isampler1D isampler2D isampler3D ' +
                        'isamplerCube isampler1DArray isampler2DArray usampler1D usampler2D usampler3D usamplerCube usampler1DArray usampler2DArray ' +
                        'sampler2DRect sampler2DRectShadow isampler2DRect usampler2DRect samplerBuffer isamplerBuffer usamplerBuffer sampler2DMS isampler2DMS ' +
                        'usampler2DMS samplerCubeArray isamplerCubeArray usamplerCubeArray samplerCubeArrayShadow image1D iimage1D uimage1D image2D iimage2D ' +
                        'uimage2D image3D iimage3D uimage3D image2DRect iimage2DRect uimage2DRect imageCube iimageCube uimageCube imageBuffer iimageBuffer ' +
                        'uimageBuffer image2DMS iimage2DMS uimage2DMS imageCubeArray iimageCubeArray uimageCubeArray ' +
                        'true false',
                    built_in: 'radians degrees sin cos tan asin acos atan sinh cosh tanh asinh acosh atanh pow exp log exp2 log2 sqrt inversesqrt ' +
                        'abs sign floor trunc round roundEven ceil fract mod modf min max clamp mix step smoothstep isnan isinf floatBitsToInt floatBitsToUint ' +
                        'intBitsToFloat uintBitsToFloat fma frexp ldexp packSnorm2x16 unpackSnorm2x16 packUnorm2x16 unpackUnorm2x16 packHalf2x16 unpackHalf2x16 ' +
                        'packDouble2x32 unpackDouble2x32 packInt2x32 unpackInt2x32 packUint2x32 unpackUint2x32 packSnorm4x8 unpackSnorm4x8 packUnorm4x8 unpackUnorm4x8 ' +
                        'length distance dot cross normalize faceforward reflect refract matrix matrixCompMult outerProduct transpose determinant inverse ' +
                        'lessThan lessThanEqual greaterThan greaterThanEqual equal notEqual any all not textureSize texture textureProj textureLod textureOffset ' +
                        'texelFetch texelFetchOffset textureProjOffset textureLodOffset textureProjLodOffset textureGrad textureGradOffset ' +
                        'texture1D texture1DProj texture1DLod texture1DProjLod texture2D texture2DProj texture2DLod texture2DProjLod texture3D ' +
                        'texture3DProj texture3DLod texture3DProjLod textureCube textureCubeLod shadow texture1DArray texture2DArray ' +
                        'textureBuffer texelFetch textureGather dFdx dFdy fwidth interpolateAtCentroid interpolateAtSample interpolateAtOffset ' +
                        'noise1 noise2 noise3 noise4 EmitStreamVertex EndStreamPrimitive EmitVertex EndPrimitive barrier memoryBarrier memoryBarrierAtomicCounter ' +
                        'memoryBarrierBuffer memoryBarrierShared memoryBarrierImage groupMemoryBarrier atomicCounterIncrement atomicCounterDecrement ' +
                        'atomicCounter atomicAdd atomicMin atomicMax atomicAnd atomicOr atomicXor atomicExchange atomicCompSwap imageSize imageLoad ' +
                        'imageStore atomicCounterIncrement atomicCounterDecrement atomicCounter atomicAdd atomicMin atomicMax atomicAnd atomicOr atomicXor ' +
                        'atomicExchange atomicCompSwap imageAtomicCounterIncrement imageAtomicCounterDecrement imageAtomicCounter imageAtomicAdd imageAtomicMin ' +
                        'imageAtomicMax imageAtomicAnd imageAtomicOr imageAtomicXor imageAtomicExchange imageAtomicCompSwap uaddCarry usubBorrow umulExtended ' +
                        'imulExtended bitfieldExtract bitfieldInsert bitfieldReverse bitCount findLSB findMSB gl_FragCoord'
                },
                contains: [
                    hljs.C_LINE_COMMENT_MODE,
                    hljs.C_BLOCK_COMMENT_MODE,
                    hljs.C_NUMBER_MODE,
                    {
                        className: 'string',
                        begin: '"', end: '"',
                        contains: [hljs.BACKSLASH_ESCAPE]
                    },
                    {
                        className: 'number',
                        begin: '\\b[0-9]*\\.[0-9]+([eE][+-]?[0-9]+)?',
                    }
                ]
            };
        });
    </script>

</body>
</html>
